<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Check-in - StorePulse</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #F5F7FA;
}
header {
  background: #0B1F3A;
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
}
header h1 {
  flex: 1;
  margin: 0;
  text-align: center;
}
.back {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  margin-right: 10px;
}
.container {
  padding: 20px;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  box-sizing: border-box;
  font-size: 14px;
}
input {
  border: 1px solid #ccc;
}
button {
  background: #D4AF37;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
button:active { transform: scale(0.98); }
.error { color: red; margin-top: 10px; }
.success { color: green; margin-top: 10px; }
</style>

</head>

<body>

<header>
  <button class="back" onclick="goBack()">⬅</button>
  <h1>Check-in</h1>
</header>

<div class="container">

  <input type="file" id="photo" accept="image/*">

  <button onclick="doCheckin()">Realizar Check-in</button>

  <div class="error" id="error"></div>
  <div class="success" id="success"></div>

</div>

<script>

// 🔙 Navegación
function goBack() { window.history.back(); }

// 🔹 BACKEND
const BACKEND_URL = "https://storepulse.onrender.com";

// ---------------- CHECKIN ----------------
async function doCheckin() {

  const error = document.getElementById("error");
  const success = document.getElementById("success");

  error.innerText = "";
  success.innerText = "";

  const photo = document.getElementById("photo").files[0];
  const userId = localStorage.getItem("userId");
  const storeId = localStorage.getItem("storeId");

  // 🔐 VALIDACIONES
  if(!userId){
    error.innerText = "⚠️ Sesión inválida";
    return;
  }

  if(!storeId){
    error.innerText = "⚠️ Debes seleccionar una tienda antes";
    return;
  }

  if(!photo){
    error.innerText = "⚠️ Selecciona una foto";
    return;
  }

  if(!navigator.geolocation){
    error.innerText = "⚠️ Geolocalización no disponible";
    return;
  }

  // 📍 GPS
  navigator.geolocation.getCurrentPosition(async pos => {

    try {

      const formData = new FormData();
      formData.append("photo", photo);
      formData.append("lat", pos.coords.latitude);
      formData.append("lng", pos.coords.longitude);
      formData.append("userId", userId);
      formData.append("storeId", storeId);

      const res = await fetch(`${BACKEND_URL}/checkin`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      // ❌ ERROR BACKEND (fuera de rango, etc)
      if(!res.ok){
        error.innerText = data.error || "❌ No se pudo hacer check-in";
        return;
      }

      // ✅ ÉXITO
      success.innerText = `✅ ${data.message} ${data.distancia ? "(" + data.distancia + ")" : ""}`;

      document.getElementById("photo").value = "";

    } catch(err) {
      console.error(err);
      error.innerText = "⚠️ Error al conectar con servidor";
    }

  }, () => {
    error.innerText = "⚠️ No se pudo obtener ubicación";
  });

}

</script>

</body>
</html>
