<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin PRO - StorePulse</title>
<style>
body { margin:0; font-family:Arial; display:flex; background:#F5F7FA; }
.sidebar { width:240px; background:#0B1F3A; color:white; padding:20px; }
.sidebar h2 { margin-bottom:20px; }
.sidebar button { width:100%; margin:8px 0; padding:12px; background:#D4AF37; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold; }
.main { flex:1; padding:20px; }
.card { background:white; padding:15px; border-radius:12px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
.grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:10px; }
input, select { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ccc; }
.user { border-bottom:1px solid #eee; padding:10px 0; }
.small { padding:5px 10px; margin-top:5px; background:red; color:white; border:none; border-radius:6px; cursor:pointer; }
.kpi { font-size:22px; font-weight:bold; }
.store-list { display:flex; gap:10px; margin-top:10px; }
.store-list div { flex:1; background:#F0F0F0; padding:10px; border-radius:8px; min-height:120px; }
.store-item { background:#D4AF37; color:white; padding:5px 8px; margin:5px 0; border-radius:6px; cursor:grab; }
.store-item.dragging { opacity:0.5; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>⚡ Admin PRO</h2>
  <button onclick="loadDashboard()">📊 Dashboard</button>
  <button onclick="loadUsers()">👤 Usuarios</button>
  <button onclick="loadCreateUser()">➕ Crear Usuario</button>
  <div id="menuAgencies">
    <button onclick="loadAgencies()">🏢 Agencias</button>
  </div>
  <div id="menuStores">
    <button onclick="loadStores()">🏬 Tiendas</button>
  </div>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="main" id="content">
  <h2>Bienvenido</h2>
</div>

<script>
const BACKEND_URL = "https://storepulse.onrender.com";
const userId = localStorage.getItem("userId");
const role = localStorage.getItem("role");
const agencyId = localStorage.getItem("agencyId");

let allUsers = [];
let allAgencies = [];
let allStores = [];
let currentUserStores = {};

// Seguridad
if(!userId) window.location.href = "./login.html";
if(role !== "superadmin") document.getElementById("menuAgencies").style.display = "none";
if(role !== "admin" && role !== "superadmin") document.getElementById("menuStores").style.display = "none";

// ---------------- FETCH ----------------
async function fetchWithAuth(url, options={}) {
  options.headers = { ...(options.headers||{}), userId };
  const res = await fetch(url, options);
  if(!res.ok) throw new Error("Error al obtener datos");
  return await res.json();
}

// ---------------- DASHBOARD ----------------
async function loadDashboard(){
  let users;
  try { users = await fetchWithAuth(`${BACKEND_URL}/users`); } 
  catch(err){ alert("Error cargando usuarios"); return; }
  document.getElementById("content").innerHTML = `
    <h2>Dashboard</h2>
    <div class="grid">
      <div class="card"><div class="kpi">${users.length}</div>Total usuarios</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="promotor").length}</div>Promotores</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="demostradora").length}</div>Demostradoras</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="admin").length}</div>Admins</div>
    </div>
  `;
}

// ---------------- USUARIOS ----------------
async function loadUsers(){
  try {
    allUsers = await fetchWithAuth(`${BACKEND_URL}/users`);
    allStores = await fetchWithAuth(`${BACKEND_URL}/stores`);
    if(role==="superadmin") allAgencies = await fetchWithAuth(`${BACKEND_URL}/agencies`);
    renderUsers(allUsers);
  } catch(err){ alert("Error cargando usuarios"); }
}

function renderUsers(users){
  let html = `<div class="card"><h3>Usuarios</h3><input placeholder="Buscar..." oninput="filterUsers(this.value)">`;
  users.forEach(u=>{
    let agencySelect = "";
    if(role==="superadmin"){
      let options = `<option value="">Sin agencia</option>`;
      allAgencies.forEach(a=>{
        const selected = (u.agencyId && (u.agencyId._id || u.agencyId) === a._id) ? "selected" : "";
        options += `<option value="${a._id}" ${selected}>${a.name}</option>`;
      });
      agencySelect = `<br><b>🏢 Agencia:</b><select onchange="changeAgency('${u._id}', this.value)">${options}</select>`;
    }

    let storesSection = "";
    if(u.role==="promotor" || u.role==="demostradora"){
      currentUserStores[u._id] = {
        assigned: u.stores || [],
        available: allStores.filter(s => !(u.stores||[]).some(as => (as._id||as) === (s._id||s)))
      };
      storesSection = renderStoreDragDrop(u._id);
    }

    html += `
      <div class="user">
        <b>${u.name}</b> (${u.email})<br>
        <b>Rol:</b>
        <select onchange="changeRole('${u._id}', this.value)">
          <option value="promotor" ${u.role==="promotor"?"selected":""}>Promotor</option>
          <option value="demostradora" ${u.role==="demostradora"?"selected":""}>Demostradora</option>
          <option value="admin" ${u.role==="admin"?"selected":""}>Admin</option>
        </select>
        ${agencySelect}
        ${storesSection}
        <br>
        <button class="small" onclick="deleteUser('${u._id}')">Eliminar</button>
      </div>
    `;
  });
  html += `</div>`;
  document.getElementById("content").innerHTML = html;

  // Drag & Drop
  Object.keys(currentUserStores).forEach(uid=>{
    const container = document.getElementById(`storeContainer_${uid}`);
    const cols = container.querySelectorAll(".store-list > div");
    cols.forEach((col,index)=>{
      col.ondragover = e=>e.preventDefault();
      col.ondrop = e=>dropStore(e, uid, index===1?"assigned":"available");
    });
  });
}

function renderStoreDragDrop(uid){
  const assigned = currentUserStores[uid].assigned;
  const available = currentUserStores[uid].available;
  return `
    <div class="store-list" id="storeContainer_${uid}">
      <div>
        <h4>🟢 Disponibles</h4>
        ${available.map(s=>`<div class="store-item" draggable="true" id="store_${s._id}" ondragstart="dragStart(event)">${s.name}</div>`).join("")}
      </div>
      <div>
        <h4>🔵 Asignadas</h4>
        ${assigned.map(s=>`<div class="store-item" draggable="true" id="store_${s._id}" ondragstart="dragStart(event)">${s.name}</div>`).join("")}
      </div>
    </div>`;
}

// ---------------- DRAG & DROP ----------------
let draggedStore = null;
function dragStart(ev){ draggedStore = ev.target; ev.target.classList.add("dragging"); }

async function dropStore(ev, uid, target){
  ev.preventDefault();
  if(!draggedStore) return;
  draggedStore.classList.remove("dragging");
  const storeId = draggedStore.id.replace("store_","");
  const storeObj = allStores.find(s => (s._id||s.id) === storeId);
  if(!storeObj){ alert("Error: tienda no encontrada"); return; }

  const userStores = currentUserStores[uid];
  if(target==="assigned"){
    if(!userStores.assigned.some(s => (s._id||s.id)===storeId)) userStores.assigned.push(storeObj);
    userStores.available = userStores.available.filter(s => (s._id||s.id)!==storeId);
  } else {
    if(!userStores.available.some(s => (s._id||s.id)===storeId)) userStores.available.push(storeObj);
    userStores.assigned = userStores.assigned.filter(s => (s._id||s.id)!==storeId);
  }

  try{
    await fetchWithAuth(`${BACKEND_URL}/users/${uid}/stores`, {
      method:"PUT",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ storeIds: userStores.assigned.map(s => s._id || s.id) })
    });
  } catch(err){
    console.error("Error actualizando tiendas:", err);
    alert("Error actualizando tiendas: " + (err.message||err));
  }
  renderUsers(allUsers);
}

// ---------------- CREAR USUARIO ----------------
async function loadCreateUser(){
  let agencySelect = "";
  if(role==="superadmin"){
    let agencies = await fetchWithAuth(`${BACKEND_URL}/agencies`);
    let options = agencies.map(a=>`<option value="${a._id}">${a.name}</option>`).join("");
    agencySelect = `<label>Agencia</label><select id="agencyId">${options}</select>`;
  }

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Crear Usuario</h3>
      <input id="name" placeholder="Nombre">
      <input id="email" placeholder="Email">
      <input id="password" placeholder="Password">
      <label>Rol</label>
      <select id="role">
        <option value="promotor">Promotor</option>
        <option value="demostradora">Demostradora</option>
        <option value="admin">Admin</option>
      </select>
      ${agencySelect}
      <button onclick="createUser()">Crear</button>
    </div>
  `;
}

async function createUser(){
  const body = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: document.getElementById("role").value,
    agencyId: role==="superadmin"?document.getElementById("agencyId")?.value:agencyId
  };
  try{
    await fetchWithAuth(`${BACKEND_URL}/admin/create-user`, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) });
    alert("Usuario creado");
    loadUsers();
  } catch(err){ alert("Error creando usuario"); }
}

// ---------------- AGENCIAS ----------------
async function loadAgencies(){
  if(role!=="superadmin") return;
  let agencies = await fetchWithAuth(`${BACKEND_URL}/agencies`);
  let html = `<div class="card"><h3>Agencias</h3>`;
  agencies.forEach(a=> html+=`<p>${a.name}</p>`);
  html += `<input id="newAgency" placeholder="Nueva agencia"><button onclick="createAgency()">Crear</button></div>`;
  document.getElementById("content").innerHTML = html;
}

async function createAgency(){
  if(role!=="superadmin") return;
  const name = document.getElementById("newAgency").value;
  if(!name) return alert("Ingresa nombre");
  await fetchWithAuth(`${BACKEND_URL}/agencies`, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ name }) });
  loadAgencies();
}

// ---------------- TIENDAS ----------------
async function loadStores(){
  if(role!=="admin" && role!=="superadmin") return;
  if(role==="superadmin") allAgencies = await fetchWithAuth(`${BACKEND_URL}/agencies`);
  allStores = await fetchWithAuth(`${BACKEND_URL}/stores`);
  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Crear Tienda</h3>
      <input id="newStore" placeholder="Nombre de tienda">
      <input id="latStore" type="number" step="any" placeholder="Latitud">
      <input id="lngStore" type="number" step="any" placeholder="Longitud">
      <input id="addressStore" placeholder="Dirección">
      ${role==="superadmin"?'<label>Agencia</label><select id="agencyIdStore">'+allAgencies.map(a=>`<option value="${a._id}">${a.name}</option>`).join("")+'</select>':""}
      <button onclick="createStore()">Crear Tienda</button>
    </div>
  `;
}

async function createStore(){
  const name = document.getElementById("newStore").value;
  const lat = parseFloat(document.getElementById("latStore").value);
  const lng = parseFloat(document.getElementById("lngStore").value);
  const address = document.getElementById("addressStore").value;
  if(!name || isNaN(lat) || isNaN(lng) || !address) return alert("Completa todos los campos");
  
  const newStore = await fetchWithAuth(`${BACKEND_URL}/stores`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ name, lat, lng, address, agencyId: role==="superadmin"?document.getElementById("agencyIdStore")?.value:agencyId })
  });
  allStores.push(newStore);
  alert("Tienda creada ✅");
  loadStores();
}

// ---------------- FILTROS ----------------
function filterUsers(term){ term=term.toLowerCase(); renderUsers(allUsers.filter(u=>u.name.toLowerCase().includes(term) || u.email.toLowerCase().includes(term)); }

// ---------------- LOGOUT ----------------
function logout(){ localStorage.clear(); window.location.href="./login.html"; }
</script>

</body>
</html>
