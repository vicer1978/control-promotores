<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>StorePulse App</title>

<style>

:root {
  --primary: #0B1F3A;
  --secondary: #D4AF37;
  --bg: #F5F7FA;
}

body {
  margin: 0;
  font-family: Arial;
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: var(--primary);
  color: white;
  padding: 20px;
}

.sidebar h2 {
  text-align: center;
}

.sidebar small {
  display:block;
  text-align:center;
  margin-bottom:15px;
  color:#ccc;
}

.sidebar button {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: var(--secondary);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* MAIN */
.main {
  flex: 1;
  background: var(--bg);
  padding: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

input, button {
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
}

input {
  width: 100%;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  background: var(--secondary);
  border: none;
  color: white;
  font-weight: bold;
}

</style>

</head>

<body>

<div class="sidebar">

  <h2>StorePulse</h2>
  <small id="userInfo"></small>

  <button onclick="loadDashboard()">📊 Dashboard</button>
  <button onclick="loadCheckin()">📍 Check-in</button>
  <button onclick="loadHistory()">📋 Historial</button>
  <button onclick="loadRanking()">🏆 Ranking</button>
  <button onclick="loadReport()">📄 Reportes</button>
  <button onclick="logout()">🚪 Salir</button>

</div>

<div class="main" id="content">
  <h2>Bienvenido</h2>
</div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";

// 🔥 VALIDAR SESIÓN (SAAS PRO)
(function(){
  const userId = localStorage.getItem("userId");
  const role = localStorage.getItem("role");

  if(!userId){
    window.location.href = "./login.html";
  }

  document.getElementById("userInfo").innerText =
    "Rol: " + role;
})();

// ---------------- DASHBOARD ----------------

async function loadDashboard(){

  const agencyId = localStorage.getItem("agencyId");

  if(!agencyId){
    document.getElementById("content").innerHTML =
      `<div class="card">⚠️ No tienes agencia asignada</div>`;
    return;
  }

  try{

    const res = await fetch(`${BACKEND_URL}/dashboard/${agencyId}`);
    const data = await res.json();

    document.getElementById("content").innerHTML = `
      <div class="card">
        <h3>📊 Dashboard</h3>
        <p>Total usuarios: ${data.totalUsers}</p>
        <p>Total tiendas: ${data.totalStores}</p>
        <p>Total check-ins: ${data.totalCheckins}</p>
        <p>Usuarios activos: ${data.activeUsers}</p>
      </div>
    `;

  }catch(err){
    document.getElementById("content").innerHTML =
      `<div class="card" style="color:red;">❌ Error cargando dashboard</div>`;
  }
}

// ---------------- CHECK-IN ----------------

function loadCheckin(){

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>📍 Check-in</h3>
      <input type="file" id="photo">
      <button onclick="doCheckin()">Enviar</button>
      <p id="msg"></p>
    </div>
  `;
}

function doCheckin(){

  const photo = document.getElementById("photo").files[0];

  if(!photo){
    alert("Selecciona una foto");
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {

    const formData = new FormData();
    formData.append("photo", photo);
    formData.append("lat", pos.coords.latitude);
    formData.append("lng", pos.coords.longitude);
    formData.append("userId", localStorage.getItem("userId"));

    try{

      const res = await fetch(`${BACKEND_URL}/checkin`,{
        method:"POST",
        body: formData
      });

      const data = await res.json();
      document.getElementById("msg").innerText = data.message;

    }catch(err){
      document.getElementById("msg").innerText = "❌ Error en check-in";
    }

  });
}

// ---------------- HISTORIAL ----------------

async function loadHistory(){

  const agencyId = localStorage.getItem("agencyId");

  try{

    const res = await fetch(`${BACKEND_URL}/checkins/${agencyId}`);
    const data = await res.json();

    let html = `<div class="card"><h3>Historial</h3>`;

    data.forEach(c=>{
      html += `<p>${new Date(c.date).toLocaleString()}</p>`;
    });

    html += `</div>`;
    document.getElementById("content").innerHTML = html;

  }catch(err){
    document.getElementById("content").innerHTML =
      `<div class="card">❌ Error cargando historial</div>`;
  }
}

// ---------------- RANKING ----------------

async function loadRanking(){

  const agencyId = localStorage.getItem("agencyId");

  try{

    const res = await fetch(`${BACKEND_URL}/stats/ranking/${agencyId}`);
    const data = await res.json();

    let html = `<div class="card"><h3>Ranking</h3>`;

    data.forEach((r,i)=>{
      html += `<p>${i+1}. ${r._id.name} - ${r.total}</p>`;
    });

    html += `</div>`;
    document.getElementById("content").innerHTML = html;

  }catch(err){
    document.getElementById("content").innerHTML =
      `<div class="card">❌ Error cargando ranking</div>`;
  }
}

// ---------------- REPORTES ----------------

function loadReport(){

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Reporte</h3>
      <input type="date" id="start">
      <input type="date" id="end">
      <button onclick="generateReport()">Generar</button>
    </div>
  `;
}

function generateReport(){

  const agencyId = localStorage.getItem("agencyId");
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  if(!start || !end){
    alert("Selecciona fechas");
    return;
  }

  window.open(`${BACKEND_URL}/report/${agencyId}?start=${start}&end=${end}`);
}

// ---------------- LOGOUT ----------------

function logout(){
  localStorage.clear();
  window.location.href = "./login.html";
}

</script>

</body>
</html>
