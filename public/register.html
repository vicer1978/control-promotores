<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - StorePulse</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0B1F3A">

<style>
:root {
  --primary: #0B1F3A;
  --secondary: #D4AF37;
  --bg: #F5F7FA;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
}

/* 🔹 HEADER UNIFICADO */
.header {
  display: flex;
  align-items: center;
  position: relative;
  background: var(--primary);
  color: white;
  padding: 15px;
}

.header .back {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  cursor: pointer;
  background: transparent;
  border: none;
  color: white;
}

.header h1 {
  margin: 0 auto;
  font-size: 1.2em;
}

/* 🔹 FORM */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.box {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 100%;
  max-width: 350px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.button {
  background: var(--secondary);
  border: none;
  padding: 12px;
  border-radius: 8px;
  width: 100%;
  font-weight: bold;
  margin-top: 10px;
  cursor: pointer;
  color: #fff;
}

.footer {
  text-align: center;
  font-size: 12px;
  margin-top: 15px;
  color: gray;
}
</style>

</head>

<body>

<div class="header">
  <button class="back" onclick="goBack()">⬅</button>
  <h1>Registrar Usuario</h1>
</div>

<div class="container">
  <div class="box">

    <input id="name" placeholder="Nombre">
    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">

    <select id="agency">
      <option value="">Selecciona agencia</option>
    </select>

    <button class="button" onclick="register()">Registrar</button>

    <div class="footer">
      Control de promotores y demostradoras
    </div>

  </div>
</div>

<script>

// 🔙 Regresar
function goBack(){
  window.location.href = "./users.html";
}

// 🌐 🔥 URL DINÁMICA (LOCAL + RENDER)
function getBackendUrl(){
  const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
  return isLocal 
    ? "http://192.168.1.10:3000"
    : "https://storepulse-backend.onrender.com"; // 🔥 CAMBIA si tu URL es diferente
}

// 🔹 Cargar agencias
async function loadAgencies(){

  try {

    const res = await fetch(`${getBackendUrl()}/agencies`);
    const agencies = await res.json();

    const select = document.getElementById("agency");

    agencies.forEach(a=>{
      const opt = document.createElement("option");
      opt.value = a._id;
      opt.textContent = a.name;
      select.appendChild(opt);
    });

  } catch(err){
    alert("⚠️ Error cargando agencias");
    console.error(err);
  }

}

// 🔹 Registrar usuario
async function register(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const agencyId = document.getElementById("agency").value;

  if(!name || !email || !password || !agencyId){
    alert("⚠️ Completa todos los campos");
    return;
  }

  try {

    const res = await fetch(`${getBackendUrl()}/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password, agencyId })
    });

    const data = await res.json();

    if(!res.ok) throw new Error(data.error || "Error registrando usuario");

    alert("✅ Usuario registrado correctamente");
    window.location.href = "./users.html";

  } catch(err){
    alert(err.message);
    console.error(err);
  }

}

// 🚀 Inicial
loadAgencies();

</script>

</body>
</html>
