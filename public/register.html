<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Registro - StorePulse</title>

<style>
:root {
  --primary: #0B1F3A;
  --secondary: #D4AF37;
  --bg: #F5F7FA;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 360px;
  background: white;
  border-radius: 15px;
  padding: 30px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.logo {
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  color: var(--primary);
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  color: gray;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.button {
  width: 100%;
  padding: 12px;
  background: var(--secondary);
  border: none;
  border-radius: 8px;
  font-weight: bold;
  margin-top: 10px;
  cursor: pointer;
  color: #fff;
}

.links {
  text-align: center;
  font-size: 12px;
  margin-top: 10px;
}

.links a {
  color: var(--primary);
  text-decoration: none;
  font-weight: bold;
}

.error {
  color: red;
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
}

.success {
  color: green;
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

  <div class="logo">StorePulse</div>
  <div class="subtitle">Crear cuenta</div>

  <input id="name" placeholder="Nombre completo">
  <input id="email" placeholder="Correo electrónico">
  <input id="password" type="password" placeholder="Contraseña">

  <button class="button" onclick="register()">Registrarme</button>

  <div class="links">
    <span>¿Ya tienes cuenta?</span>
    <a href="./login.html">Iniciar sesión</a>
  </div>

  <div class="error" id="error"></div>
  <div class="success" id="success"></div>

</div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";

async function register(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const error = document.getElementById("error");
  const success = document.getElementById("success");

  error.innerText = "";
  success.innerText = "";

  if(!name || !email || !password){
    error.innerText = "⚠️ Completa todos los campos";
    return;
  }

  try {

    // 🔥 Wake-up backend
    await fetch(BACKEND_URL);

    const res = await fetch(`${BACKEND_URL}/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email,
        password
      })
    });

    const data = await res.json();

    if(!res.ok){
      error.innerText = data.error || "Error al registrarse";
      return;
    }

    success.innerText = "✅ Usuario registrado correctamente";

    // 🔥 Redirigir después de 1.5s
    setTimeout(() => {
      window.location.href = "./login.html";
    }, 1500);

  } catch(err){

    console.error(err);
    error.innerText = "❌ No se pudo conectar al servidor";

  }
}

</script>

</body>

</html>
