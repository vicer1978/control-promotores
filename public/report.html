<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte - StorePulse</title>
    <style>
        :root { --primary: #0B1F3A; --gold: #D4AF37; --bg: #F5F7FA; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 30px; }
        header { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 10; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; margin-right: 15px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--gold); padding-bottom: 8px; text-transform: capitalize; font-size: 1.3rem; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 800; margin-bottom: 8px; color: #4a5568; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #f8fafc; transition: border 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: var(--gold); background: white; }
        .photo-preview { width: 100%; height: 200px; background: #f1f5f9; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-top: 10px; overflow: hidden; border: 2px dashed #cbd5e1; position: relative; cursor: pointer; }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 25px; box-shadow: 0 4px 10px rgba(11, 31, 58, 0.2); transition: 0.3s; }
        .btn-main:disabled { background: #94a3b8; cursor: not-allowed; }
        .hidden { display: none !important; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .math-box { background: #f0f9ff; border: 1px solid #bae6fd; padding: 10px; border-radius: 10px; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<header>
    <button class="back-btn" onclick="window.location.href='dashboard_tareas.html'">✕</button>
    <span id="headerTitle">Nuevo Reporte</span>
</header>

<div class="container">
    <div class="card">
        <h3 id="formTitle">Cargando...</h3>
        <form id="reportForm">
            <div class="form-group hidden" id="group-articulo">
                <label id="label-articulo">Nombre del Artículo / Marca</label>
                <input type="text" id="articulo" placeholder="articulo y presentación">
            </div>

            <div id="block-demo" class="hidden">
                <div class="grid-2">
                    <div class="form-group"><label>Inv. Inicial</label><input type="number" id="inv_inicial" value="0" oninput="calcularFinal()"></div>
                    <div class="form-group"><label>Resurtido</label><input type="number" id="resurtido" value="0" oninput="calcularFinal()"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Ventas</label><input type="number" id="ventas" value="0" oninput="calcularFinal()"></div>
                    <div class="form-group">
                        <label>Inv. Final</label>
                        <div class="math-box"><span id="inv_final_display" style="font-weight: 800; color: var(--primary);">0</span></div>
                        <input type="hidden" id="inv_final" value="0">
                    </div>
                </div>
            </div>

            <div id="group-precios" class="hidden">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Precio Normal ($)</label>
                        <input type="number" id="precio_normal" step="0.01" value="0">
                    </div>
                    <div class="form-group">
                        <label>Precio Oferta ($)</label>
                        <input type="number" id="precio_oferta" step="0.01" value="0">
                    </div>
                </div>
            </div>

            <div class="form-group hidden" id="group-cantidad">
                <label id="label-cantidad">Cantidad / Piezas</label>
                <div id="container-cantidad-dinamico">
                    <input type="number" id="cantidad" value="0">
                </div>
            </div>

            <div class="form-group hidden" id="group-foto">
                <label>Foto de Evidencia</label>
                <input type="file" id="foto" accept="image/*" capture="environment" onchange="previewImage(this)" class="hidden">
                <div class="photo-preview" id="preview" onclick="document.getElementById('foto').click()">
                    <span style="color:#94a3b8; font-size: 14px; text-align: center;">📸<br>Toca para tomar foto</span>
                </div>
            </div>

            <div class="form-group hidden" id="group-comentarios">
                <label id="label-comentarios">Observaciones</label>
                <textarea id="comentarios" rows="4" placeholder="Escribe aquí los detalles..."></textarea>
            </div>

            <button type="button" id="btnSend" class="btn-main" onclick="saveReport()">ENVIAR REPORTE</button>
        </form>
    </div>
</div>

<script>
    const BACKEND_URL = "https://storepulse.onrender.com";
    const urlParams = new URLSearchParams(window.location.search);
    const typeFromUrl = urlParams.get('type') || localStorage.getItem("currentReportType");
    const userId = localStorage.getItem("userId");
    const userRole = (localStorage.getItem("role") || "promotor").toLowerCase();
    const storeId = localStorage.getItem("activeStoreId");
    const agencyId = localStorage.getItem("agencyId");

    const config = {
        'ventas': { title: 'Ventas', fields: ['group-articulo', 'block-demo', 'group-comentarios'] },
        'degustacion': { 
            title: 'Degustación', 
            fields: ['group-articulo', 'group-cantidad'],
            labelCant: 'Detalla la cantidad de degustación proporcionada' 
        },
        'precios': { title: 'Precios', fields: ['group-articulo', 'group-precios'], labelArt: 'Artículo / Producto' },
        'agotados': { title: 'Agotados', fields: ['group-articulo'], labelArt: 'Artículo Agotado' },
        'preagotados': { title: 'Pre-Agotados', fields: ['group-articulo', 'group-cantidad'], labelCant: 'Cantidad en Stock' },
        'inventario': { title: 'Inventarios', fields: ['group-articulo', 'group-cantidad'], labelCant: 'Cantidad Física' },
        'exhibicion': { title: 'Exhibiciones Adicionales', fields: ['group-comentarios', 'group-foto'], labelCom: 'Descripción de la Exhibición' },
        'competencia': { title: 'Precios Competencia', fields: ['group-articulo', 'group-precios'], labelArt: 'Marca Competencia' },
        'fotos': { title: 'Fotos Anaquel', fields: ['group-foto', 'group-comentarios'] }
    };

    window.onload = () => {
        if (!userId) { window.location.href = "login.html"; return; }

        const s = config[typeFromUrl] || config['ventas'];
        document.getElementById("formTitle").innerText = s.title;
        document.getElementById("headerTitle").innerText = s.title;

        s.fields.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.classList.remove("hidden");
        });

        const contenedorCant = document.getElementById("container-cantidad-dinamico");
        if (typeFromUrl === 'degustacion') {
            contenedorCant.innerHTML = `<textarea id="cantidad" rows="3" placeholder="Detalla aquí la cantidad..."></textarea>`;
        } else {
            contenedorCant.innerHTML = `<input type="number" id="cantidad" value="0">`;
        }

        if(s.labelArt) document.getElementById("label-articulo").innerText = s.labelArt;
        if(s.labelCant) document.getElementById("label-cantidad").innerText = s.labelCant;
        if(s.labelCom) document.getElementById("label-comentarios").innerText = s.labelCom;
    };

    function calcularFinal() {
        const inicial = parseInt(document.getElementById("inv_inicial").value) || 0;
        const resurtido = parseInt(document.getElementById("resurtido").value) || 0;
        const ventas = parseInt(document.getElementById("ventas").value) || 0;
        const total = (inicial + resurtido) - ventas;
        document.getElementById("inv_final_display").innerText = total;
        document.getElementById("inv_final").value = total;
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('preview').innerHTML = `<img src="${e.target.result}">`;
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function saveReport() {
        const btn = document.getElementById("btnSend");
        btn.disabled = true; btn.innerText = "OBTENIENDO GPS...";

        const getCoords = () => {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    () => resolve({ lat: 0, lng: 0 }),
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            });
        };

        const coords = await getCoords();
        btn.innerText = "ENVIANDO...";

        const formData = new FormData();
        formData.append("agencyId", agencyId);
        formData.append("storeId", storeId);
        formData.append("userId", userId);
        formData.append("lat", coords.lat);
        formData.append("lng", coords.lng);

        if(!document.getElementById("group-articulo").classList.contains("hidden")) {
            formData.append("articulo", document.getElementById("articulo").value || "N/A");
        }

        if(!document.getElementById("group-precios").classList.contains("hidden")) {
            formData.append("precio_normal", Number(document.getElementById("precio_normal").value) || 0);
            formData.append("precio_oferta", Number(document.getElementById("precio_oferta").value) || 0);
        }

        if(!document.getElementById("block-demo").classList.contains("hidden")) {
            formData.append("inv_inicial", Number(document.getElementById("inv_inicial").value) || 0);
            formData.append("resurtido", Number(document.getElementById("resurtido").value) || 0);
            formData.append("ventas", Number(document.getElementById("ventas").value) || 0);
            formData.append("inv_final", Number(document.getElementById("inv_final").value) || 0);
        }

        if(!document.getElementById("group-cantidad").classList.contains("hidden")) {
            const valorCant = document.getElementById("cantidad").value;
            if (typeFromUrl === 'degustacion') {
                formData.append("cantidad", 0);
                const obsActual = document.getElementById("comentarios").value || "";
                formData.set("observaciones", `DETALLE DEGUSTACIÓN: ${valorCant}. ${obsActual}`);
            } else {
                formData.append("cantidad", Number(valorCant) || 0);
            }
        }

        if (!formData.has("observaciones")) {
            formData.append("observaciones", document.getElementById("comentarios").value || "");
        }

        // ASIGNACIÓN DE TIPO PARA EL ADMIN
        const reportTitle = config[typeFromUrl] ? config[typeFromUrl].title : typeFromUrl;
        formData.append("reportType", reportTitle);

        const fotoInput = document.getElementById("foto");
        if(fotoInput && fotoInput.files[0]) formData.append("photo", fotoInput.files[0]);

        try {
            const res = await fetch(`${BACKEND_URL}/reports`, {
                method: "POST",
                headers: { "userId": userId },
                body: formData
            });

            if(res.ok) {
                alert("✅ Reporte enviado correctamente");
                window.location.href = "dashboard_tareas.html";
            } else {
                const err = await res.json();
                alert("❌ Error: " + (err.error || "Falla al enviar"));
            }
        } catch (err) {
            alert("❌ Error de conexión con el servidor");
        } finally {
            btn.disabled = false; btn.innerText = "ENVIAR REPORTE";
        }
    }
</script>
</body>
</html>
