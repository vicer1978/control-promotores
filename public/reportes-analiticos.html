<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Usuarios - StorePulse</title>
<style>
:root {
  --primary: #0B1F3A;
  --secondary: #D4AF37;
  --bg: #F5F7FA;
  --text: #1A1A1A;
}
body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
}
.header {
  background: var(--primary);
  color: white;
  padding: 15px;
  text-align: center;
  position: relative;
  display: flex;
  align-items: center;
}
.header h1 {
  flex: 1;
  margin: 0;
  text-align: center;
}
.back {
  position: absolute;
  left: 10px;
  background: transparent;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}
.container {
  padding: 20px;
}
.button {
  background: var(--secondary);
  border: none;
  padding: 12px;
  border-radius: 8px;
  width: 100%;
  font-weight: bold;
  margin-bottom: 15px;
  cursor: pointer;
}
.card {
  background: white;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.title {
  font-weight: bold;
}
.actions {
  margin-top: 10px;
  display: flex;
  gap: 5px;
}
.btn-small {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  color: white;
  cursor: pointer;
}
.edit { background: #1976D2; }
.delete { background: #D32F2F; }
.stores { background: var(--primary); }
</style>
</head>
<body>

<div class="header">
  <button class="back" onclick="goBack()">⬅</button>
  <h1>Gestión de Usuarios</h1>
</div>

<div class="container">
  <button class="button" onclick="crear()">➕ Nuevo Usuario</button>
  <div id="listaUsuarios"></div>
</div>

<script>
// 🔹 URL dinámica del backend
function getBackendUrl() {
  return (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
    ? "http://192.168.1.10:3000"
    : "https://mi-servidor-produccion.com";
}

// 🔙 Regresar
function goBack() {
  window.history.back();
}

// 🔐 Validar rol
const role = localStorage.getItem("role");
if(role !== "admin" && role !== "agencia") {
  alert("⚠️ No tienes permisos");
  window.location.href = "./dashboard.html";
}

// ➕ Crear
function crear() {
  window.location.href = "./register.html";
}

// 🗑 Eliminar usuario
async function eliminar(id){
  if(!confirm("¿Eliminar usuario?")) return;
  try {
    const res = await fetch(`${getBackendUrl()}/users/${id}`, { method: "DELETE" });
    if(!res.ok) throw new Error("No se pudo eliminar");
    loadUsuarios();
  } catch(err) {
    alert("⚠️ " + err.message);
  }
}

// ✏️ Editar usuario
function editar(id){
  window.location.href = `./edit-user.html?id=${id}`;
}

// 🏪 Asignar tiendas
function asignarTiendas(id){
  localStorage.setItem("editUserId", id);
  window.location.href = "./users.stores.html";
}

// 🔹 Cargar usuarios desde backend
async function loadUsuarios(){
  const lista = document.getElementById("listaUsuarios");
  lista.innerHTML = "Cargando...";
  try{
    const agencyId = localStorage.getItem("agencyId");
    const res = await fetch(`${getBackendUrl()}/users/${agencyId}`);
    const usuarios = await res.json();
    if(usuarios.length === 0){
      lista.innerHTML = "<p>No hay usuarios registrados</p>";
      return;
    }
    lista.innerHTML = "";
    usuarios.forEach(u => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <div class="title">${u.name}</div>
        <div>${u.email}</div>
        <div>Tipo: ${u.role}</div>
        <div class="actions">
          <button class="btn-small edit" onclick="editar('${u._id}')">✏️</button>
          <button class="btn-small delete" onclick="eliminar('${u._id}')">🗑</button>
          <button class="btn-small stores" onclick="asignarTiendas('${u._id}')">🏪</button>
        </div>
      `;
      lista.appendChild(div);
    });
  } catch(err){
    console.error(err);
    lista.innerHTML = "<p>⚠️ Error cargando usuarios</p>";
  }
}

// Inicial
loadUsuarios();
</script>

</body>
</html>
