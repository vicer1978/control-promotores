<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StorePulse</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #003366;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #ffd700;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      background-color: #0055a5;
      padding: 25px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
    }

    input {
      padding: 10px;
      border-radius: 5px;
      border: none;
      font-size: 1em;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background-color: #ffd700;
      color: #003366;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #ffc300;
    }

    #error {
      margin-top: 10px;
      color: #ffcc00;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>Login</h1>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Entrar</button>
  </form>

  <div id="error"></div>

  <script>
    const apiUrl = "https://storepulse.onrender.com"; // Cambiar si es otro host

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch(`${apiUrl}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if(res.ok){
          // Redirigir según rol
          if(data.role === "admin"){
            window.location = "admin.html";
          } else {
            window.location = "checkin.html";
          }
        } else {
          document.getElementById("error").textContent = data.message || "Error al iniciar sesión";
        }
      } catch(err){
        document.getElementById("error").textContent = "Error de conexión con el servidor";
      }
    });
  </script>

</body>
</html>
