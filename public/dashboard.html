<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>StorePulse - Inicio</title>

<style>
body { margin:0; font-family:Arial; background:#F5F7FA; }

.header {
  display:flex;
  align-items:center;
  padding:15px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.menu-btn {
  font-size:22px;
  cursor:pointer;
  margin-right:10px;
}

.title { font-weight:bold; font-size:18px; }

.container { padding:20px; }

.store {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.drawer {
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:#0B1F3A;
  color:white;
  padding:20px;
  transition:0.3s;
}

.drawer.open { left:0; }

.drawer button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#D4AF37;
  border:none;
  border-radius:6px;
  color:white;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
  width:90%;
}

.btn-green {
  background:#22c55e;
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
  width:100%;
  margin-top:10px;
}

.btn-gray {
  background:#ccc;
  padding:10px;
  border:none;
  border-radius:8px;
  width:100%;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="drawer" id="drawer">
  <h3 id="userName"></h3>
  <p id="userRole"></p>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="title">StorePulse</div>
</div>

<div class="container" id="storesContainer">
  <h2>Selecciona tu tienda</h2>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="storeName"></h3>
    <p>Si inicias operación comenzará el monitoreo</p>

    <button class="btn-green" onclick="startCheckin()">INICIAR OPERACIÓN</button>
    <button class="btn-gray" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";

const userId = localStorage.getItem("userId");
const name = localStorage.getItem("name");
const role = localStorage.getItem("role");

let selectedStore = null;

if(!userId) window.location.href="./login.html";

document.getElementById("userName").innerText = name;
document.getElementById("userRole").innerText = role;

// ---------------- MENU
function toggleMenu(){
  document.getElementById("drawer").classList.toggle("open");
}

// ---------------- LOAD STORES
async function loadStores(){

  const res = await fetch(`${BACKEND_URL}/users/${userId}/stores`,{
    headers:{ userId }
  });

  const stores = await res.json();

  let html = "<h2>Selecciona tu tienda</h2>";

  stores.forEach(s=>{
    html += `
      <div class="store" onclick='openModal(${JSON.stringify(s)})'>
        <b>${s.name}</b><br>
        ${s.address || ""}
      </div>
    `;
  });

  document.getElementById("storesContainer").innerHTML = html;
}

// ---------------- MODAL
function openModal(store){
  selectedStore = store;
  document.getElementById("storeName").innerText = store.name;
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

// ---------------- CHECKIN
function startCheckin(){

  if(!navigator.geolocation){
    return alert("GPS no disponible");
  }

  navigator.geolocation.getCurrentPosition(async pos=>{

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const formData = new FormData();
    formData.append("userId", userId);
    formData.append("storeId", selectedStore._id);
    formData.append("lat", lat);
    formData.append("lng", lng);

    const res = await fetch(`${BACKEND_URL}/checkin`,{
      method:"POST",
      body: formData
    });

    const data = await res.json();

    if(data.error){
      alert(data.error + " ("+data.distancia+")");
      return;
    }

    alert("✅ Check-in exitoso");

    localStorage.setItem("activeStore", selectedStore._id);

    // 👉 aquí ya entras a la app real
    window.location.href = "./home.html";

  });

}

// ---------------- LOGOUT
function logout(){
  localStorage.clear();
  window.location.href="./login.html";
}

loadStores();

</script>

</body>
</html>
