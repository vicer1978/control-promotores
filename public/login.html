<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StorePulse</title>
    <style>
        :root { --primary: #0B1F3A; --gold: #D4AF37; --bg: #F5F7FA; }
        body { 
            background: var(--primary); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 350px; 
            text-align: center; 
        }
        .logo { font-size: 2rem; font-weight: bold; color: var(--primary); margin-bottom: 30px; }
        .logo span { color: var(--gold); }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--gold); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        button:hover { background: #b8952d; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #msg { color: #ef4444; font-size: 14px; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">Store<span>Pulse</span> 🚀</div>
        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" id="btnEntrar">ENTRAR</button>
        </form>
        <div id="msg"></div>
    </div>

    <script>
        const BACKEND_URL = "https://storepulse.onrender.com";

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btnEntrar');

            msg.innerText = "";
            btn.disabled = true;
            btn.innerText = "Verificando...";

            try {
                const res = await fetch(`${BACKEND_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // --- VALIDACIÓN DE INTEGRIDAD DE DATOS ---
                    if (!data.userId || data.userId.length !== 24) {
                        throw new Error("El servidor devolvió un ID de usuario no válido.");
                    }

                    // 1. Limpiar sesión previa
                    localStorage.clear();

                    // 2. Guardar nuevos datos
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('name', data.name);
                    
                    // --- NORMALIZACIÓN DE ROL ---
                    const normalizedRole = (data.role || 'promotor').toLowerCase().trim();
                    localStorage.setItem('userRole', normalizedRole); 
                    localStorage.setItem('role', normalizedRole); 

                    // --- CORRECCIÓN PARA REPORTES Y AGENCIAS ---
                    if (data.agencyId) {
                        localStorage.setItem('agencyId', data.agencyId); 
                        localStorage.setItem('activeAgencyId', data.agencyId); 
                    }

                    // Guardar ProjectId si viene desde el login (opcional para clientes directos)
                    if (data.projectId) {
                        localStorage.setItem('projectId', data.projectId);
                    }

                    console.log("Sesión guardada:", { id: data.userId, role: normalizedRole });

                    // 3. Redirección
                    setTimeout(() => {
                        if (normalizedRole === 'super-admin') {
                            window.location.href = 'Admin/super-admin.html';
                        } else if (normalizedRole === 'admin') {
                            window.location.href = 'Admin/admin.html';
                        } else if (normalizedRole === 'cliente') {
                            // NUEVA RUTA: El cliente primero elige su proyecto
                            window.location.href = 'mis-proyectos.html';
                        } else {
                            // Promotores y Demostradoras van al dashboard operativo
                            window.location.href = 'dashboard.html';
                        }
                    }, 100);

                } else {
                    msg.innerText = data.message || "Credenciales incorrectas";
                }
            } catch (err) {
                msg.innerText = err.message || "Error de conexión con el servidor";
                console.error("Error en login:", err);
            } finally {
                btn.disabled = false;
                btn.innerText = "ENTRAR";
            }
        }

        // Limpiar mensajes al escribir de nuevo
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                document.getElementById('msg').innerText = "";
            });
        });
    </script>

</body>
</html>
