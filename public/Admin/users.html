<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Usuarios - StorePulse</title>

<style>

:root {
  --primary:#0B1F3A;
  --secondary:#D4AF37;
  --bg:#F5F7FA;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  position:relative;
  background:var(--primary);
  color:white;
  padding:15px;
}

.header .back{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:white;
  font-size:20px;
  cursor:pointer;
}

.header h1{
  margin:0 auto;
  font-size:1.2em;
}

/* CONTENT */
.container{ padding:20px; }

.button{
  width:100%;
  padding:12px;
  background:var(--secondary);
  border:none;
  border-radius:8px;
  font-weight:bold;
  margin-bottom:15px;
  cursor:pointer;
  color:white;
}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.title{ font-weight:bold; }

.actions{
  display:flex;
  gap:5px;
  margin-top:10px;
}

.btn{
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
  font-size:12px;
}

.edit{ background:#1976D2; }
.delete{ background:#D32F2F; }

select{
  width:100%;
  padding:6px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #ccc;
}

.badge{
  display:inline-block;
  padding:3px 6px;
  border-radius:6px;
  font-size:11px;
  background:#eee;
}

</style>
</head>

<body>

<div class="header">
  <button class="back" onclick="goBack()">⬅</button>
  <h1>Usuarios</h1>
</div>

<div class="container">
  <button class="button" onclick="crear()">➕ Nuevo Usuario</button>
  <div id="listaUsuarios"></div>
</div>

<script>

// 🔐 SESIÓN
const userId = localStorage.getItem("userId");
const role = localStorage.getItem("role");
const agencyId = localStorage.getItem("agencyId");

if(!userId){
  window.location.href="./login.html";
}

if(role !== "admin" && role !== "superadmin"){
  alert("Sin permisos");
  window.location.href="./login.html";
}

// 🌐 BACKEND
const BACKEND_URL = "https://storepulse.onrender.com";

let agencies = [];

// 🔙
function goBack(){
  window.location.href="./admin.html";
}

// 🔹 Cargar agencias
async function loadAgencies(){
  const res = await fetch(`${BACKEND_URL}/agencies`);
  agencies = await res.json();
}

// ➕ Crear
function crear(){
  window.location.href="./register.html";
}

// 🗑 Eliminar
async function eliminar(id){

  if(!confirm("¿Eliminar usuario?")) return;

  await fetch(`${BACKEND_URL}/users/${id}`,{
    method:"DELETE"
  });

  alert("Usuario eliminado");
  render();
}

// ✏️ Editar nombre
async function editar(id){

  const name = prompt("Nuevo nombre");
  if(!name) return;

  await fetch(`${BACKEND_URL}/users/${id}`,{
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name })
  });

  alert("Actualizado");
  render();
}

// 🔥 CAMBIAR AGENCIA (SOLO SUPERADMIN)
async function cambiarAgencia(userId, newAgencyId){

  if(role !== "superadmin"){
    alert("Solo superadmin puede cambiar agencia");
    return;
  }

  await fetch(`${BACKEND_URL}/users/${userId}/agency`,{
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ agencyId:newAgencyId })
  });

  alert("Agencia actualizada");
}

// 🖥 RENDER
async function render(){

  await loadAgencies();

  let url = "";

  // 🔥 CLAVE MULTIEMPRESA
  if(role === "superadmin"){
    url = `${BACKEND_URL}/users`;
  } else {
    url = `${BACKEND_URL}/users/${agencyId}`;
  }

  const res = await fetch(url);
  const usuarios = await res.json();

  const cont = document.getElementById("listaUsuarios");
  cont.innerHTML = "";

  if(usuarios.length === 0){
    cont.innerHTML = "<p>No hay usuarios</p>";
    return;
  }

  usuarios.forEach(u=>{

    const userAgencyId = (u.agencyId && u.agencyId._id) ? u.agencyId._id : u.agencyId;

    let options = "";

    if(role === "superadmin"){
      agencies.forEach(a=>{
        options += `
          <option value="${a._id}" ${userAgencyId==a._id?"selected":""}>
            ${a.name}
          </option>
        `;
      });
    }

    cont.innerHTML += `
      <div class="card">

        <div class="title">${u.name}</div>
        <div>${u.email}</div>

        <div class="badge">Rol: ${u.role}</div>

        ${
          role === "superadmin"
          ? `
            <label>🏢 Agencia</label>
            <select onchange="cambiarAgencia('${u._id}', this.value)">
              ${options}
            </select>
          `
          : `<div class="badge">Agencia: ${u.agencyId?.name || "Sin asignar"}</div>`
        }

        <div class="actions">
          <button class="btn edit" onclick="editar('${u._id}')">Editar</button>
          <button class="btn delete" onclick="eliminar('${u._id}')">Eliminar</button>
        </div>

      </div>
    `;
  });

}

// 🚀 INIT
render();

</script>

</body>
</html>
