<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Trabajo - StorePulse</title>
    <style>
        :root { --primary: #0B1F3A; --gold: #D4AF37; --bg: #F5F7FA; --danger: #e11d48; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: var(--bg); color: #1a202c; }
        
        /* BANNER SUPERIOR */
        .store-info { 
            background: var(--primary); 
            color: white; 
            padding: 35px 20px; 
            text-align: center; 
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .store-info h2 { margin: 0; font-size: 1.4rem; font-weight: 600; }
        
        .role-badge { 
            display: inline-block; 
            background: var(--gold); 
            color: var(--primary); 
            padding: 6px 18px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            margin-top: 12px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 8px #22c55e;
        }
        
        /* GRID DE TAREAS */
        .task-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 25px 20px; 
            max-width: 500px;
            margin: auto;
        }
        
        .task-card { 
            background: white; 
            padding: 25px 10px; 
            border-radius: 20px; 
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); 
            cursor: pointer; 
            border: 1px solid #edf2f7;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .task-card:active { 
            transform: scale(0.92); 
            background: #f8fafc; 
        }
        
        .task-card .icon { font-size: 35px; margin-bottom: 12px; }
        .task-card span { font-size: 0.85rem; font-weight: 700; color: #475569; }
        
        /* FOOTER */
        .footer-actions { padding: 10px 20px 40px; text-align: center; }
        .btn-finish { 
            width: 100%; 
            max-width: 460px;
            padding: 18px; 
            background: var(--danger); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-weight: 800; 
            font-size: 1rem; 
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(225, 29, 72, 0.3);
            transition: 0.2s;
        }
        .btn-finish:active { transform: translateY(2px); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="store-info">
        <h2 id="activeStoreName">Cargando tienda...</h2>
        <div id="userRoleBadge" class="role-badge">Cargando...</div>
        <p style="margin: 15px 0 0; opacity: 0.8; font-size: 0.85rem; font-weight: 500;">
            <span class="status-dot"></span> Operación en curso
        </p>
    </div>

    <div class="task-grid" id="taskContainer">
        </div>

    <div class="footer-actions">
        <button id="btnFinish" onclick="finishDay()" class="btn-finish">
            FINALIZAR DÍA / SALIDA
        </button>
    </div>

    <script>
        const BACKEND_URL = "https://storepulse.onrender.com";
        
        // 1. Datos de sesión mejorados para detectar el rol
        const userId = localStorage.getItem("userId");
        const role = localStorage.getItem("role") || localStorage.getItem("userRole") || "promotor";
        const storeName = localStorage.getItem("activeStoreName");
        const activeStoreId = localStorage.getItem("activeStoreId");

        // Seguridad
        if (!userId) window.location.href = "./login.html";
        if (!activeStoreId) window.location.href = "./dashboard.html";

        // Actualizar UI básica
        document.getElementById("activeStoreName").innerText = storeName || "Sin tienda";
        
        // CORRECCIÓN DE ETIQUETA: Mostramos el rol real del usuario
        const badge = document.getElementById("userRoleBadge");
        if (badge) {
            badge.innerText = role.replace('-', ' ').toUpperCase();
        }

        // 2. Diccionario de Tareas (Roles sincronizados)
        const tasks = {
            'demostradora': [
                { id: 'reporte_diario', label: 'Reporte Diario', icon: '📋' },
                { id: 'degustacion', label: 'Degustación', icon: '🍷' },
                { id: 'competencia', label: 'Competencia', icon: '🏁' }
            ],
            'promotor': [
                { id: 'ventas', label: 'Ventas', icon: '📈' },
                { id: 'precios', label: 'Precios Propios', icon: '💰' },
                { id: 'agotados', label: 'Agotados', icon: '❌' },
                { id: 'inventario', label: 'Inventarios', icon: '📦' },
                { id: 'exhibicion', label: 'Exhib. Adicional', icon: '✨' },
                { id: 'competencia', label: 'Competencia', icon: '🏁' },
                { id: 'fotos_anaquel', label: 'Fotos Anaquel', icon: '📸' },
                { id: 'fotos_exhibicion', label: 'Fotos Exhibición', icon: '🖼️' }
            ]
        };

        // 3. Renderizado dinámico según el rol
        function renderTasks() {
            const container = document.getElementById("taskContainer");
            if (!container) return;

            // Normalizamos el rol a minúsculas para comparar con el diccionario
            const currentRole = role.toLowerCase().trim();
            const userTasks = tasks[currentRole] || tasks['promotor']; 

            container.innerHTML = userTasks.map(task => `
                <div class="task-card" onclick="goToReport('${task.id}')">
                    <span class="icon">${task.icon}</span>
                    <span>${task.label}</span>
                </div>
            `).join('');
        }

        function goToReport(type) {
            window.location.href = `./report.html?type=${type}&storeId=${activeStoreId}`;
        }

        async function finishDay() {
            if(!confirm("¿Deseas registrar tu salida y finalizar el turno?")) return;

            const btn = document.getElementById("btnFinish");
            btn.innerText = "REGISTRANDO SALIDA...";
            btn.disabled = true;

            try {
                localStorage.removeItem("activeStoreId");
                localStorage.removeItem("activeStoreName");
                
                alert("Salida registrada con éxito. ¡Buen descanso!");
                window.location.href = "./dashboard.html";
            } catch (err) {
                alert("Hubo un problema al cerrar sesión.");
                btn.innerText = "FINALIZAR DÍA / SALIDA";
                btn.disabled = false;
            }
        }

        // Ejecutar al cargar
        renderTasks();
    </script>
</body>
</html>
