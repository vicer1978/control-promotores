<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historial de Check-ins</title>
<style>
:root {
  --primary: #0B1F3A;
  --secondary: #D4AF37;
  --bg: #F5F7FA;
  --text: #1A1A1A;
}
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
}
header {
  background: var(--primary);
  color: white;
  display: flex;
  align-items: center;
  padding: 15px;
}
header h1 {
  flex: 1;
  margin: 0;
  text-align: center;
  font-size: 18px;
}
.back {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  margin-right: 10px;
}
.container {
  padding: 20px;
}
.card {
  background: white;
  border-radius: 10px;
  padding: 15px;
  margin: 10px 0;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-content { flex: 1; }
.card-photo {
  width: 70px;
  height: 70px;
  border-radius: 8px;
  background: #eee;
  margin-left: 10px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid #ddd;
}
.card-photo img { width: 100%; height: 100%; object-fit: cover; }

select {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<header>
  <button class="back" onclick="goBack()">⬅</button>
  <h1>Historial de Asistencia</h1>
</header>

<div class="container">
  <select id="filtro" onchange="filtrar()">
    <option value="todos">Todos los eventos</option>
    <option value="checkin">Entradas (Check-in)</option>
    <option value="checkout">Salidas (Check-out)</option>
  </select>

  <div id="lista"></div>
</div>

<script>
const BACKEND_URL = "https://storepulse.onrender.com";

function goBack() { window.history.back(); }

let checkins = [];
const agencyId = localStorage.getItem("agencyId");
const userId = localStorage.getItem("userId");

async function loadCheckins() {
  try {
    const res = await fetch(`${BACKEND_URL}/checkins/${agencyId}`, {
        headers: { "userid": userId }
    });
    if(!res.ok) throw new Error("Error al obtener datos");
    const data = await res.json();
    checkins = data;
    render(checkins);
  } catch(err) {
    console.error(err);
    document.getElementById("lista").innerHTML = "<p style='color:red;'>⚠️ Error al conectar al servidor</p>";
  }
}

function render(data){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if(data.length === 0) {
      lista.innerHTML = "<p style='text-align:center; color:#999;'>No hay registros aún.</p>";
      return;
  }

  data.forEach(c => {
    const usuario = c.userId?.name || "Desconocido";
    const tienda = c.storeId?.name || "Tienda";
    const esEntrada = c.type === 'checkin';
    const colorTipo = esEntrada ? '#22c55e' : '#ef4444';
    
    // Si hay foto, preparamos el HTML
    let fotoHtml = '';
    if(c.foto_url) {
        const fullUrl = `${BACKEND_URL}${c.foto_url}`;
        fotoHtml = `<div class="card-photo" onclick="window.open('${fullUrl}', '_blank')">
                        <img src="${fullUrl}" alt="Evidencia">
                    </div>`;
    }

    lista.innerHTML += `
      <div class="card">
        <div class="card-content">
            <b style="color:${colorTipo}">${c.type.toUpperCase()}</b> - ${usuario}<br>
            <span>🏪 ${tienda}</span><br>
            <small>🕒 ${new Date(c.timestamp).toLocaleString()}</small>
        </div>
        ${fotoHtml}
      </div>
    `;
  });
}

function filtrar(){
  const valor = document.getElementById("filtro").value;
  if(valor === 'todos'){
    render(checkins);
  } else {
    const filtrados = checkins.filter(c => c.type === valor);
    render(filtrados);
  }
}

loadCheckins();
</script>

</body>
</html>
