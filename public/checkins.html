<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historial de Check-ins</title>
<style>
:root {
  --primary: #0B1F3A;
  --secondary: #D4AF37;
  --bg: #F5F7FA;
  --text: #1A1A1A;
}
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
}
header {
  background: var(--primary);
  color: white;
  display: flex;
  align-items: center;
  padding: 15px;
}
header h1 {
  flex: 1;
  margin: 0;
  text-align: center;
  font-size: 18px;
}
.back {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  margin-right: 10px;
}
.container {
  padding: 20px;
}
.button {
  background: var(--secondary);
  border: none;
  padding: 10px;
  border-radius: 8px;
  margin: 5px 0;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
}
.card {
  background: white;
  border-radius: 10px;
  padding: 15px;
  margin: 10px 0;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
select {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<header>
  <button class="back" onclick="goBack()">⬅</button>
  <h1>Historial de Check-ins</h1>
</header>

<div class="container">
  <select id="filtro" onchange="filtrar()">
    <option value="todos">Todos</option>
    <option value="promotor">Promotor</option>
    <option value="demostradora">Demostradora</option>
  </select>

  <div id="lista"></div>
</div>

<script>
// 🔹 BACKEND FIJO
const BACKEND_URL = "https://storepulse.onrender.com";

// Flecha de retroceso
function goBack() { window.history.back(); }

// Datos cargados desde backend
let checkins = [];

// Obtener agencyId
const agencyId = localStorage.getItem("agencyId");

// 🔹 Cargar checkins desde backend
async function loadCheckins() {
  try {
    const res = await fetch(`${BACKEND_URL}/checkins/${agencyId}`);
    if(!res.ok) throw new Error("Error al obtener datos");
    const data = await res.json();
    checkins = data;
    render(checkins);
  } catch(err) {
    console.error(err);
    document.getElementById("lista").innerHTML = "<p style='color:red;'>⚠️ No se pudo conectar al servidor</p>";
  }
}

// Renderizar tarjetas
function render(data){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(c => {
    let contenido = "";
    if(c.tipo === 'promotor'){
      contenido = `
        <b>Tipo:</b> Promotor<br>
        Inventario: ${c.inventario || "-"}<br>
        Precio: ${c.precio || "-"}
      `;
    } else {
      contenido = `
        <b>Tipo:</b> Demostradora<br>
        Degustaciones: ${c.degustaciones || "-"}<br>
        Ventas: ${c.ventas || "-"}
      `;
    }

    lista.innerHTML += `
      <div class="card">
        ${contenido}<br><br>
        <small>${new Date(c.date || c.fecha).toLocaleString()}</small>
      </div>
    `;
  });
}

// Filtrar por tipo
function filtrar(){
  const valor = document.getElementById("filtro").value;
  if(valor === 'todos'){
    render(checkins);
  } else {
    const filtrados = checkins.filter(c => c.tipo === valor);
    render(filtrados);
  }
}

// Inicializar
loadCheckins();
</script>

</body>
</html>
