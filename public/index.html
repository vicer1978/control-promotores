<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido a StorePulse</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #e6f0ff, #fff8e6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 40px 20px;
    }

    h1 {
      color: #003366;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
      margin-bottom: 10px;
    }

    p {
      color: #333;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 700px;
    }

    .card {
      background: #003366;
      color: #ffd700;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 6px 10px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card i {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .card:hover {
      background: #0055a5;
      transform: translateY(-5px);
      box-shadow: 0 12px 16px rgba(0,0,0,0.3);
    }

    @media (max-width: 480px) {
      .grid {
        gap: 15px;
      }
      .card {
        padding: 15px;
      }
      .card i {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <h1>Bienvenido a StorePulse</h1>
  <p>Selecciona una opción para continuar:</p>

  <div class="grid">
    <a href="register.html" class="card"><i class="fas fa-user-plus"></i>Registro Promotor</a>
    <a href="login.html" class="card"><i class="fas fa-sign-in-alt"></i>Login</a>
    <a href="checkin.html" class="card"><i class="fas fa-map-marker-alt"></i>Check-in</a>
    <a href="admin.html" class="card"><i class="fas fa-cogs"></i>Panel Admin</a>
    <a href="stores.html" class="card"><i class="fas fa-store"></i>Tiendas</a>
    <a href="upload.html" class="card"><i class="fas fa-upload"></i>Subir Foto</a>
  </div>
</body>
</html>
