<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin - StorePulse</title>

<style>
body { margin:0; font-family:Arial; display:flex; }

.sidebar {
  width:220px;
  background:#0B1F3A;
  color:white;
  padding:20px;
}

.sidebar button {
  width:100%;
  margin:8px 0;
  padding:10px;
  background:#D4AF37;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
  background:#F5F7FA;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button.small {
  padding:5px 10px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Admin</h3>
  <button onclick="loadUsers()">👤 Usuarios</button>
  <button onclick="loadCreateUser()">➕ Crear Usuario</button>
  <button onclick="loadAgencies()">🏢 Agencias</button>
</div>

<div class="main" id="content">
  <h2>Panel Admin</h2>
</div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";

// ---------------- USUARIOS ----------------

async function loadUsers(){

  const res = await fetch(`${BACKEND_URL}/users`);
  const users = await res.json();

  let html = `<div class="card"><h3>Usuarios</h3>`;

  users.forEach(u=>{
    html += `
      <div class="card">
        <b>${u.name}</b><br>
        ${u.email}<br>
        Rol:
        <select onchange="changeRole('${u._id}', this.value)">
          <option ${u.role==="user"?"selected":""}>user</option>
          <option ${u.role==="admin"?"selected":""}>admin</option>
          <option ${u.role==="superadmin"?"selected":""}>superadmin</option>
        </select>
        <br>
        <button class="small" onclick="deleteUser('${u._id}')">Eliminar</button>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

// ---------------- CREAR USUARIO ----------------

async function loadCreateUser(){

  const agenciesRes = await fetch(`${BACKEND_URL}/agencies`);
  const agencies = await agenciesRes.json();

  let options = "";
  agencies.forEach(a=>{
    options += `<option value="${a._id}">${a.name}</option>`;
  });

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Crear Usuario</h3>

      <input id="name" placeholder="Nombre">
      <input id="email" placeholder="Email">
      <input id="password" placeholder="Password">

      <select id="role">
        <option value="user">Promotor</option>
        <option value="admin">Admin</option>
      </select>

      <select id="agencyId">${options}</select>

      <button onclick="createUser()">Crear</button>
    </div>
  `;
}

async function createUser(){

  await fetch(`${BACKEND_URL}/admin/create-user`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      password: document.getElementById("password").value,
      role: document.getElementById("role").value,
      agencyId: document.getElementById("agencyId").value
    })
  });

  alert("Usuario creado");
  loadUsers();
}

// ---------------- ROLE ----------------

async function changeRole(id, role){

  await fetch(`${BACKEND_URL}/users/${id}/role`,{
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ role })
  });

  alert("Rol actualizado");
}

// ---------------- DELETE ----------------

async function deleteUser(id){

  if(!confirm("¿Eliminar usuario?")) return;

  await fetch(`${BACKEND_URL}/users/${id}`,{
    method:"DELETE"
  });

  loadUsers();
}

// ---------------- AGENCIAS ----------------

async function loadAgencies(){

  const res = await fetch(`${BACKEND_URL}/agencies`);
  const agencies = await res.json();

  let html = `<div class="card"><h3>Agencias</h3>`;

  agencies.forEach(a=>{
    html += `<p>${a.name}</p>`;
  });

  html += `
    <input id="newAgency" placeholder="Nueva agencia">
    <button onclick="createAgency()">Crear</button>
  </div>`;

  document.getElementById("content").innerHTML = html;
}

async function createAgency(){

  await fetch(`${BACKEND_URL}/agencies`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      name: document.getElementById("newAgency").value
    })
  });

  loadAgencies();
}

</script>

</body>
</html>
