<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido a StorePulse</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #003366, #FFD700);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #fff;
      text-align: center;
    }

    h1 { margin-bottom: 10px; font-size: 2.2em; }
    p { margin-bottom: 30px; font-size: 1.1em; }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 200px;
    }

    .buttons a {
      text-decoration: none;
      background-color: #003366;
      color: #FFD700;
      padding: 12px 0;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .buttons a:hover {
      background-color: #001f4d;
      color: #fff;
    }
  </style>
</head>
<body>

  <h1>Bienvenido a StorePulse</h1>
  <p>Selecciona una opción para continuar:</p>

  <div class="buttons" id="buttons-container"></div>

  <script>
    // Obtener rol del usuario desde localStorage
    const role = localStorage.getItem("role");

    const container = document.getElementById("buttons-container");

    const buttons = [];

    if (!role) {
      // Si no hay rol, mostrar solo registro y login
      buttons.push({ text: "Registro Usuario", href: "register.html" });
      buttons.push({ text: "Login", href: "login.html" });
    } else if (role === "admin") {
      // Botones para admin
      buttons.push({ text: "Panel Admin", href: "admin.html" });
      buttons.push({ text: "Usuarios", href: "users.html" });
      buttons.push({ text: "Tiendas", href: "stores.html" });
      buttons.push({ text: "Subir Foto", href: "upload.html" });
    } else {
      // Botones para usuario normal
      buttons.push({ text: "Check-in", href: "checkin.html" });
      buttons.push({ text: "Mis Tiendas", href: "user-stores.html" });
      buttons.push({ text: "Subir Foto", href: "upload.html" });
    }

    // Generar los botones dinámicamente
    buttons.forEach(b => {
      const a = document.createElement("a");
      a.href = b.href;
      a.textContent = b.text;
      container.appendChild(a);
    });
  </script>

</body>
</html>
