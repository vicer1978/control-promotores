<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Super Admin - StorePulse</title>
    <style>
        :root { --primary: #0B1F3A; --gold: #D4AF37; --bg: #F5F7FA; --text: #1e293b; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; color: var(--text); }
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; padding: 20px; position: fixed; display: flex; flex-direction: column; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.4rem; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .sidebar button { width: 100%; text-align: left; background: none; border: none; color: #94a3b8; padding: 14px; cursor: pointer; border-radius: 8px; margin: 4px 0; font-size: 1rem; transition: 0.2s; }
        .sidebar button.active { background: var(--gold); color: var(--primary); font-weight: bold; }
        .logout-btn { margin-top: auto; color: #fda4af !important; border: 1px solid #451a1a !important; text-align: center !important; }
        .main { margin-left: 260px; flex: 1; padding: 40px; min-height: 100vh; box-sizing: border-box; }
        .header-bar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .stat-card { background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; min-width: 120px; }
        .search-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        .search-box input { flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 0.8rem; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; }
        .status { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .active { background: #dcfce7; color: #166534; }
        .inactive { background: #fee2e2; color: #991b1b; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #ef4444; color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>StorePulse 🚀</h2>
    <button onclick="showSection('agencias')" id="menu-agencias" class="active">🏢 Agencias</button>
    <button onclick="showSection('usuarios')" id="menu-usuarios">👥 Usuarios Globales</button>
    <button onclick="logout()" class="logout-btn">🚪 Cerrar Sesión</button>
</div>

<div class="main">
    <div class="header-bar">
        <h1 id="section-title">Gestión de Agencias</h1>
        <div style="display:flex; gap:10px;">
            <div class="stat-card"><small>AGENCIAS</small><div id="count-agencias">0</div></div>
            <div class="stat-card"><small>USUARIOS</small><div id="count-usuarios">0</div></div>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="globalSearch" placeholder="Buscar..." onkeyup="filterData()">
    </div>

    <div id="sec-agencias">
        <div class="card">
            <h3>➕ Nueva Agencia</h3>
            <div style="display: flex; gap: 10px;">
                <input id="new-ag-name" placeholder="Nombre" style="flex:1; padding:10px;">
                <input id="new-ag-email" placeholder="Email" style="flex:1; padding:10px;">
                <button class="btn" style="background:var(--gold)" onclick="crearAgencia()">REGISTRAR</button>
            </div>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Agencia</th><th>Email</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody id="lista-agencias"></tbody>
            </table>
        </div>
    </div>

    <div id="sec-usuarios" style="display: none;">
        <div class="card">
            <table>
                <thead><tr><th>Nombre</th><th>Email</th><th>Agencia</th><th>Acciones</th></tr></thead>
                <tbody id="lista-usuarios-global"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const BACKEND_URL = "https://storepulse.onrender.com";
const userId = localStorage.getItem("userId");
let rawAgencias = [], rawUsuarios = [], currentView = 'agencias';

if(localStorage.getItem("role") !== "superadmin") window.location.href = "../login.html";

async function api(url, method = 'GET', body = null) {
    const res = await fetch(url, {
        method,
        headers: { "Content-Type": "application/json", "userId": userId },
        body: body ? JSON.stringify(body) : null
    });
    return res.json();
}

function showSection(section) {
    currentView = section;
    document.getElementById('sec-agencias').style.display = section === 'agencias' ? 'block' : 'none';
    document.getElementById('sec-usuarios').style.display = section === 'usuarios' ? 'block' : 'none';
    document.getElementById('menu-agencias').className = section === 'agencias' ? 'active' : '';
    document.getElementById('menu-usuarios').className = section === 'usuarios' ? 'active' : '';
    if(section === 'usuarios') loadGlobalUsers(); else loadAgencies();
}

async function loadAgencies() {
    rawAgencias = await api(`${BACKEND_URL}/agencies`);
    renderAgencias(rawAgencias);
    document.getElementById("count-agencias").innerText = rawAgencias.length;
}

function renderAgencias(data) {
    document.getElementById("lista-agencias").innerHTML = data.map(a => `
        <tr>
            <td><strong>${a.name}</strong></td>
            <td>${a.email}</td>
            <td><span class="status ${a.active ? 'active' : 'inactive'}">${a.active ? 'ACTIVA' : 'INACTIVA'}</span></td>
            <td>
                <button class="btn" onclick="toggleAgencia('${a._id}', ${a.active})">OnOff</button>
                <button class="btn btn-danger" onclick="eliminarAgencia('${a._id}', '${a.name}')">Borrar</button>
            </td>
        </tr>
    `).join("");
}

async function loadGlobalUsers() {
    rawUsuarios = await api(`${BACKEND_URL}/users`);
    renderUsuarios(rawUsuarios);
    const c = await api(`${BACKEND_URL}/users/count`);
    document.getElementById("count-usuarios").innerText = c.count || 0;
}

function renderUsuarios(data) {
    document.getElementById("lista-usuarios-global").innerHTML = data.map(u => `
        <tr>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td>${u.agencyId?.name || 'S/A'}</td>
            <td><button class="btn btn-danger" onclick="eliminarUsuario('${u._id}')">Eliminar</button></td>
        </tr>
    `).join("");
}

function filterData() {
    const term = document.getElementById('globalSearch').value.toLowerCase();
    if(currentView === 'agencias') {
        renderAgencias(rawAgencias.filter(a => a.name.toLowerCase().includes(term)));
    } else {
        renderUsuarios(rawUsuarios.filter(u => u.name.toLowerCase().includes(term) || (u.agencyId?.name || "").toLowerCase().includes(term)));
    }
}

async function crearAgencia() {
    const name = document.getElementById("new-ag-name").value;
    const email = document.getElementById("new-ag-email").value;
    if(!name || !email) return alert("Faltan datos");
    await api(`${BACKEND_URL}/agencies`, 'POST', { name, email });
    loadAgencies();
}

async function toggleAgencia(id, s) {
    await api(`${BACKEND_URL}/agencies/${id}`, 'PATCH', { active: !s });
    loadAgencies();
}

async function eliminarAgencia(id, nombre) {
    const confirmacion = prompt(`⚠️ ¡PELIGRO! Esto borrará TODOS los usuarios y reportes de "${nombre}". Escribe el nombre de la agencia para confirmar:`);
    if(confirmacion && confirmacion.toLowerCase() === nombre.toLowerCase()) {
        await api(`${BACKEND_URL}/agencies/${id}`, 'DELETE');
        loadAgencies();
    }
}

async function eliminarUsuario(id) {
    if(confirm("¿Borrar usuario?")) { await api(`${BACKEND_URL}/users/${id}`, 'DELETE'); loadGlobalUsers(); }
}

function logout() { 
    localStorage.clear(); 
    sessionStorage.clear();
    window.location.href = "../login.html"; 
}

window.onload = loadAgencies;
</script>
</body>
</html>
