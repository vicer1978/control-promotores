<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StorePulse - Mis Proyectos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .project-card {
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            border-radius: 15px;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-left: 5px solid #007bff;
        }
        .icon-box {
            font-size: 2rem;
            color: #007bff;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="mb-4 text-center">Selecciona una Marca / Proyecto</h2>
        <p class="text-muted text-center mb-5">Bienvenido. Elige el proyecto que deseas supervisar hoy.</p>
        
        <div id="proyectos-container" class="row g-4">
            </div>
    </div>

    <script>
        async function cargarProyectos() {
            const userId = localStorage.getItem('userId');
            if (!userId) window.location.href = "/";

            try {
                const res = await fetch('/client-projects', {
                    headers: { 'userId': userId }
                });
                const proyectos = await res.json();
                const container = document.getElementById('proyectos-container');

                if (proyectos.length === 0) {
                    container.innerHTML = `<div class="col-12 text-center"><p>No tienes proyectos activos asignados.</p></div>`;
                    return;
                }

                proyectos.forEach(p => {
                    container.innerHTML += `
                        <div class="col-md-4 col-sm-6">
                            <div class="card h-100 project-card p-4 text-center" onclick="seleccionarProyecto('${p._id}', '${p.name}')">
                                <div class="icon-box">📂</div>
                                <h5 class="card-title text-uppercase font-weight-bold">${p.name}</h5>
                                <p class="text-muted small">Ver reportes y asistencia</p>
                                <button class="btn btn-outline-primary btn-sm mt-2">Entrar al Dashboard</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Error:", err);
            }
        }

        function seleccionarProyecto(id, nombre) {
            localStorage.setItem('projectId', id);
            localStorage.setItem('projectName', nombre);
            window.location.href = "/dashboard";
        }

        window.onload = cargarProyectos;
    </script>
</body>
</html>
