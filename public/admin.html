<!DOCTYPE html>
<html>
<body>

<h2>Panel Admin</h2>

<button onclick="loadUsers()">Ver Usuarios</button>
<ul id="users"></ul>

<script>
const API_URL = "https://storepulse.onrender.com";

async function loadUsers(){
  try {
    const res = await fetch(`${API_URL}/users`);
    const users = await res.json();
    const ul = document.getElementById("users");
    ul.innerHTML = "";
    users.forEach(u => {
      const li = document.createElement("li");
      li.textContent = `${u.name} (${u.email}) - ${u.role || "promotor"}`;
      ul.appendChild(li);
    });
  } catch(err) {
    alert("Error cargando usuarios");
    console.error(err);
  }
}
</script>

</body>
</html>
