<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - StorePulse</title>
    <style>
        body { background: white; color: black; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #000; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h1>StorePulse</h1>
        <input type="email" id="email" placeholder="Email"><br><br>
        <input type="password" id="password" placeholder="Password"><br><br>
        <button onclick="login()">ENTRAR</button>
        <p id="msg" style="color:red"></p>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('role', data.role);
                    window.location.href = data.role === 'superadmin' ? 'Admin/super-admin.html' : 'dashboard.html';
                } else {
                    alert(data.message);
                }
            } catch (err) { alert("Error de conexión"); }
        }
    </script>
</body>
</html>
