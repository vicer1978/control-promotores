<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Degustación</title>
    <style>
        body { margin:0; font-family: sans-serif; background:#f1f5f9; padding:20px; }
        .card { background:white; padding:20px; border-radius:12px; }
        input, textarea, button { width:100%; padding:15px; margin:10px 0; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; }
        button { background:#D4AF37; color:white; border:none; font-weight:bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🍷 Reporte de Degustación</h3>
        <input type="text" id="art" placeholder="¿Qué producto degustaron?">
        <textarea id="obs" rows="5" placeholder="Ej: Se dieron 3 cajas y comentaron que el sabor es muy bueno..."></textarea>
        <button onclick="enviarDeg()">GUARDAR DEGUSTACIÓN</button>
        <button onclick="location.href='home.html'" style="background:#64748b">VOLVER</button>
    </div>
    <script>
    async function enviarDeg() {
        const body = {
            agencyId: localStorage.getItem("agencyId"),
            userId: localStorage.getItem("userId"),
            storeId: localStorage.getItem("currentStoreId"),
            reportType: "degustacion",
            articulo: document.getElementById("art").value,
            observaciones: document.getElementById("obs").value
        };
        const res = await fetch("https://storepulse.onrender.com/reports", {
            method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
        });
        if(res.ok) { alert("Degustación registrada"); location.href='home.html'; }
    }
    </script>
</body>
</html>
