<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin - StorePulse</title>
<style>
:root {
  --primary: #0B1F3A;
  --secondary: #D4AF37;
  --bg: #F5F7FA;
  --text: #1A1A1A;
}
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: var(--bg);
}
header {
  background: var(--primary);
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
}
header h1 {
  flex: 1;
  margin: 0;
  text-align: center;
}
.back {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  margin-right: 10px;
}
.container {
  padding: 20px;
  max-width: 400px;
  margin: 0 auto;
}
input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  font-size: 14px;
  box-sizing: border-box;
}
input {
  border: 1px solid #ccc;
}
button {
  background: var(--secondary);
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
button:active {
  transform: scale(0.98);
}
.error {
  color: red;
  font-size: 12px;
  margin-top: 10px;
  text-align: center;
}
</style>
</head>
<body>

<header>
  <button class="back" onclick="goBack()">⬅</button>
  <h1>Panel Admin</h1>
</header>

<div class="container">
  <input id="name" placeholder="Nombre">
  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">
  <input id="agencyId" placeholder="ID Agencia">
  <button onclick="registerUser()">Registrar Usuario</button>
  <div class="error" id="error"></div>
</div>

<script>
// Flecha de retroceso
function goBack() { window.history.back(); }

// 🔹 URL fija del backend para la APK y web
const BACKEND_URL = "https://storepulse.onrender.com";

async function registerUser() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const agencyId = document.getElementById("agencyId").value.trim();
  const error = document.getElementById("error");
  error.innerText = "";

  if (!name || !email || !password || !agencyId) {
    error.innerText = "⚠️ Completa todos los campos";
    return;
  }

  try {
    const res = await fetch(`${BACKEND_URL}/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({ name, email, password, agencyId })
    });

    const data = await res.json();

    if (!res.ok) {
      error.innerText = data.error || "⚠️ Error al registrar usuario";
      return;
    }

    alert("Usuario registrado correctamente");

    // Limpiar campos
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
    document.getElementById("agencyId").value = "";

  } catch (err) {
    console.error(err);
    error.innerText = "❌ No se pudo conectar al servidor";
  }
}
</script>

</body>
</html>
