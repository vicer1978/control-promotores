<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Registro - StorePulse</title>

<style>

:root {
  --primary:#0B1F3A;
  --secondary:#D4AF37;
  --bg:#F5F7FA;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:360px;
  background:white;
  border-radius:15px;
  padding:30px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.logo{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:var(--primary);
}

.subtitle{
  text-align:center;
  font-size:12px;
  color:gray;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.password-wrapper{
  position:relative;
}

.toggle-pass{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  border:none;
  background:none;
  cursor:pointer;
}

.button{
  width:100%;
  padding:12px;
  background:var(--secondary);
  border:none;
  border-radius:8px;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
  color:white;
}

.button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.links{
  text-align:center;
  font-size:12px;
  margin-top:12px;
}

.links a{
  color:var(--primary);
  font-weight:bold;
  text-decoration:none;
}

.error{
  color:red;
  font-size:12px;
  text-align:center;
  margin-top:10px;
}

.success{
  color:green;
  font-size:12px;
  text-align:center;
  margin-top:10px;
}

.footer{
  text-align:center;
  margin-top:15px;
  font-size:11px;
  color:gray;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">StorePulse</div>
  <div class="subtitle">Crear cuenta</div>

  <input id="name" placeholder="Nombre completo">
  <input id="email" placeholder="Correo electrónico">

  <div class="password-wrapper">
    <input id="password" type="password" placeholder="Contraseña">
    <button class="toggle-pass" onclick="togglePassword()" id="eyeBtn">👁️</button>
  </div>

  <button class="button" id="btnRegister" onclick="register()">Registrarme</button>

  <div class="links">
    <span>¿Ya tienes cuenta?</span>
    <a href="./login.html">Iniciar sesión</a>
  </div>

  <div class="error" id="error"></div>
  <div class="success" id="success"></div>

  <div class="footer">StorePulse SaaS</div>

</div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";

// 🔐 SI YA ESTÁ LOGUEADO → REDIRIGIR
window.onload = () => {
  const userId = localStorage.getItem("userId");
  const role = localStorage.getItem("role");

  if(userId && role){
    if(role === "admin" || role === "superadmin"){
      window.location.href = "./admin.html";
    } else {
      window.location.href = "./app.html";
    }
  }
};

// 👁️ PASSWORD
function togglePassword(){
  const pass = document.getElementById("password");
  const btn = document.getElementById("eyeBtn");

  if(pass.type === "password"){
    pass.type = "text";
    btn.innerText = "🙈";
  } else {
    pass.type = "password";
    btn.innerText = "👁️";
  }
}

// 🔐 REGISTER PRO
async function register(){

  const btn = document.getElementById("btnRegister");

  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim().toLowerCase();
  let password = document.getElementById("password").value.trim();

  const error = document.getElementById("error");
  const success = document.getElementById("success");

  error.innerText = "";
  success.innerText = "";

  // VALIDACIONES
  if(!name || !email || !password){
    error.innerText = "⚠️ Completa todos los campos";
    return;
  }

  if(password.length < 4){
    error.innerText = "⚠️ Mínimo 4 caracteres";
    return;
  }

  // 🔄 BLOQUEAR BOTÓN
  btn.disabled = true;
  btn.innerText = "Creando...";

  try {

    // 🔥 Wake Render
    await fetch(BACKEND_URL);

    const res = await fetch(`${BACKEND_URL}/register`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({ name,email,password })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || "Error al registrar");
    }

    success.innerText = "✅ Cuenta creada correctamente";

    setTimeout(()=>{
      window.location.href="./login.html";
    },1500);

  } catch(err){

    console.error(err);
    error.innerText = err.message;

  } finally {

    btn.disabled = false;
    btn.innerText = "Registrarme";
  }
}

</script>

</body>
</html>
