<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Admin - StorePulse</title>

<style>
:root {
  --primary:#0B1F3A;
  --secondary:#D4AF37;
  --bg:#F5F7FA;
}

body{
  margin:0;
  font-family:Arial;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:var(--primary);
  color:white;
  padding:20px;
  min-height:100vh;
}

.sidebar h2{
  text-align:center;
}

.sidebar button{
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--secondary);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  background:var(--bg);
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--secondary);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

ul{
  list-style:none;
  padding:0;
}

li{
  background:white;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Admin</h2>
  <button onclick="loadUsers()">👥 Usuarios</button>
  <button onclick="loadAgencies()">🏢 Agencias</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="main" id="content">
  <h2>Panel Administrador</h2>
</div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";

// 🔐 PROTECCIÓN
if(localStorage.getItem("role") !== "admin" && localStorage.getItem("role") !== "superadmin"){
  window.location.href = "./login.html";
}

// ---------------- USUARIOS ----------------
async function loadUsers(){

  const agencyId = localStorage.getItem("agencyId");

  const res = await fetch(`${BACKEND_URL}/users/${agencyId}`);
  const users = await res.json();

  let html = `
  <div class="card">
    <h3>Crear Usuario</h3>
    <input id="name" placeholder="Nombre">
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">
    
    <select id="role">
      <option value="user">Promotor</option>
      <option value="admin">Admin</option>
      <option value="superadmin">Super Admin</option>
    </select>

    <button onclick="createUser()">Crear</button>
  </div>

  <div class="card">
    <h3>Usuarios</h3>
    <ul>
  `;

  users.forEach(u=>{
    html += `
      <li>
        ${u.name} (${u.role})
        <button onclick="deleteUser('${u._id}')">Eliminar</button>
      </li>
    `;
  });

  html += "</ul></div>";

  document.getElementById("content").innerHTML = html;
}

async function createUser(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;
  const agencyId = localStorage.getItem("agencyId");

  await fetch(`${BACKEND_URL}/register`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name,email,password,role,agencyId })
  });

  alert("Usuario creado");
  loadUsers();
}

async function deleteUser(id){

  if(!confirm("Eliminar usuario?")) return;

  await fetch(`${BACKEND_URL}/users/${id}`,{
    method:"DELETE"
  });

  loadUsers();
}

// ---------------- AGENCIAS ----------------
async function loadAgencies(){

  const res = await fetch(`${BACKEND_URL}/agencies`);
  const data = await res.json();

  let html = `
  <div class="card">
    <h3>Crear Agencia</h3>
    <input id="agencyName" placeholder="Nombre agencia">
    <button onclick="createAgency()">Crear</button>
  </div>

  <div class="card">
    <h3>Agencias</h3>
    <ul>
  `;

  data.forEach(a=>{
    html += `
      <li>
        ${a.name}
        <button onclick="deleteAgency('${a._id}')">Eliminar</button>
      </li>
    `;
  });

  html += "</ul></div>";

  document.getElementById("content").innerHTML = html;
}

async function createAgency(){

  const name = document.getElementById("agencyName").value;

  await fetch(`${BACKEND_URL}/agencies`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name })
  });

  alert("Agencia creada");
  loadAgencies();
}

async function deleteAgency(id){

  if(!confirm("Eliminar agencia?")) return;

  await fetch(`${BACKEND_URL}/agencies/${id}`,{
    method:"DELETE"
  });

  loadAgencies();
}

// ---------------- LOGOUT ----------------
function logout(){
  localStorage.clear();
  window.location.href = "./login.html";
}

</script>

</body>
</html>
