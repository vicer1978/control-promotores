<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte - StorePulse</title>
    <style>
        :root { --primary: #0B1F3A; --gold: #D4AF37; --bg: #F5F7FA; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 30px; }
        header { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin-right: 10px; }
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--gold); padding-bottom: 5px; text-transform: capitalize; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .photo-preview { width: 100%; height: 200px; background: #eee; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-top: 10px; overflow: hidden; border: 2px dashed #ccc; }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }

        .btn-main { background: var(--gold); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .btn-main:disabled { opacity: 0.5; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <button class="back-btn" onclick="history.back()">⬅</button>
    <span id="headerTitle">Nuevo Reporte</span>
</header>

<div class="container">
    <div class="card">
        <h3 id="formTitle">Cargando...</h3>
        <form id="reportForm">
            <div class="form-group" id="group-articulo">
                <label>Nombre del Artículo</label>
                <input type="text" id="articulo" placeholder="Ej. Jabón Líquido 500ml">
            </div>

            <div id="block-demo" class="hidden">
                <div class="form-group"><label>Inv. Inicial</label><input type="number" id="inv_inicial"></div>
                <div class="form-group"><label>Ventas Realizadas</label><input type="number" id="ventas"></div>
                <div class="form-group"><label>Inv. Final</label><input type="number" id="inv_final"></div>
                <div class="form-group"><label>Precio de Venta</label><input type="number" id="precio"></div>
            </div>

            <div class="form-group hidden" id="group-cantidad">
                <label id="label-cantidad">Cantidad / Valor</label>
                <input type="number" id="cantidad">
            </div>
            
            <div class="form-group hidden" id="group-precio-simple">
                <label>Precio ($)</label>
                <input type="number" id="precio_simple">
            </div>

            <div class="form-group hidden" id="group-foto">
                <label>Captura de Evidencia</label>
                <input type="file" id="foto" accept="image/*" capture="camera" onchange="previewImage(this)">
                <div class="photo-preview" id="preview"><span style="color:#999">Sin foto seleccionada</span></div>
            </div>

            <div class="form-group hidden" id="group-comentarios">
                <label>Comentarios / Observaciones</label>
                <textarea id="comentarios" rows="4" placeholder="Escribe aquí..."></textarea>
            </div>

            <button type="button" id="btnSend" class="btn-main" onclick="saveReport()">ENVIAR REPORTE</button>
        </form>
    </div>
</div>

<script>
    const BACKEND_URL = "https://storepulse.onrender.com";
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    const storeId = localStorage.getItem("activeStoreId");
    const userId = localStorage.getItem("userId");

    // Configuración de los campos según el tipo de reporte
    const config = {
        'completo_demo': { title: 'Reporte Diario', fields: ['block-demo'] },
        'degustacion': { title: 'Degustación', fields: ['group-cantidad'], labelQty: 'Degustaciones dadas' },
        'ventas': { title: 'Reporte Ventas', fields: ['group-cantidad'], labelQty: 'Unidades vendidas' },
        'precios': { title: 'Control de Precios', fields: ['group-precio-simple'] },
        'precios_competencia': { title: 'Precios Competencia', fields: ['group-precio-simple'] },
        'agotados': { title: 'Reporte Agotados', fields: [] }, // Solo artículo
        'preagotados': { title: 'Pre-Agotados', fields: ['group-cantidad'], labelQty: 'Existencia actual' },
        'inventario': { title: 'Inventario Físico', fields: ['group-cantidad'], labelQty: 'Cantidad en estante' },
        'exhibicion_libre': { title: 'Exhibición Adicional', fields: ['group-comentarios'], hideArt: true },
        'fotos_anaquel': { title: 'Foto de Anaquel', fields: ['group-foto'] },
        'fotos_exhibicion': { title: 'Foto Exhibición Especial', fields: ['group-foto', 'group-comentarios'] }
    };

    window.onload = () => {
        if(!type || !config[type]) return alert("Tipo de reporte no válido");
        
        const settings = config[type];
        document.getElementById("formTitle").innerText = settings.title;
        document.getElementById("headerTitle").innerText = settings.title;

        // Mostrar campos necesarios
        settings.fields.forEach(id => document.getElementById(id).classList.remove("hidden"));
        if(settings.labelQty) document.getElementById("label-cantidad").innerText = settings.labelQty;
        if(settings.hideArt) document.getElementById("group-articulo").classList.add("hidden");
    };

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview').innerHTML = `<img src="${e.target.result}">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function saveReport() {
        const btn = document.getElementById("btnSend");
        btn.disabled = true;
        btn.innerText = "Enviando...";

        const formData = new FormData();
        formData.append("storeId", storeId);
        formData.append("type", type);
        formData.append("articulo", document.getElementById("articulo").value);
        formData.append("cantidad", document.getElementById("cantidad").value);
        formData.append("precio", document.getElementById("precio").value || document.getElementById("precio_simple").value);
        formData.append("inv_inicial", document.getElementById("inv_inicial").value);
        formData.append("inv_final", document.getElementById("inv_final").value);
        formData.append("comentarios", document.getElementById("comentarios").value);
        
        const fotoFile = document.getElementById("foto").files[0];
        if(fotoFile) formData.append("photo", fotoFile);

        try {
            const res = await fetch(`${BACKEND_URL}/reports`, {
                method: "POST",
                headers: { "userId": userId },
                body: formData
            });

            if(res.ok) {
                alert("✅ Guardado correctamente");
                // Si el tipo permite seguir agregando, limpiamos. Si no, volvemos.
                if(['fotos_anaquel', 'fotos_exhibicion'].includes(type)) {
                    window.location.href = "./home.html";
                } else {
                    document.getElementById("reportForm").reset();
                    document.getElementById('preview').innerHTML = '<span style="color:#999">Sin foto</span>';
                }
            } else {
                throw new Error("Error en el servidor");
            }
        } catch (err) {
            alert("❌ Error al enviar reporte");
        } finally {
            btn.disabled = false;
            btn.innerText = "ENVIAR REPORTE";
        }
    }
</script>
</body>
</html>
