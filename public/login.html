<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StorePulse</title>
    <style>
        :root { --primary: #0B1F3A; --gold: #D4AF37; --bg: #F5F7FA; }
        body { 
            background: var(--primary); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 350px; 
            text-align: center; 
        }
        .logo { font-size: 2rem; font-weight: bold; color: var(--primary); margin-bottom: 30px; }
        .logo span { color: var(--gold); }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--gold); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        button:hover { background: #b8952d; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #msg { color: #ef4444; font-size: 14px; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">Store<span>Pulse</span> 🚀</div>
        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" id="btnEntrar">ENTRAR</button>
        </form>
        <div id="msg"></div>
    </div>

    <script>
        const BACKEND_URL = "https://storepulse.onrender.com";

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btnEntrar');

            msg.innerText = "";
            btn.disabled = true;
            btn.innerText = "Verificando...";

            try {
    const response = await fetch(`${BACKEND_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (response.ok) {
        console.log("Datos recibidos:", data);

        // 1. Limpiar sesión previa para evitar conflictos de roles antiguos
        localStorage.clear();

        // 2. Extraer el objeto de usuario (maneja si viene dentro de .user o directo en la raíz)
        const userObj = data.user || data; 
        const role = (userObj.role || "").toLowerCase().trim();

        // 3. Guardar datos esenciales
        localStorage.setItem("token", data.token);
        localStorage.setItem("userId", userObj._id || userObj.userId || data.userId);
        localStorage.setItem("userRole", role);
        localStorage.setItem("userName", userObj.name || data.name || "Usuario");

        // Guardar IDs opcionales si existen (Agencia o Proyecto)
        if (data.agencyId || userObj.agencyId) {
            const aId = data.agencyId || userObj.agencyId;
            localStorage.setItem('agencyId', aId);
            localStorage.setItem('activeAgencyId', aId);
        }

        // 4. Redirección lógica basada en tu estructura de carpetas
        setTimeout(() => {
            if (role === 'super-admin') {
                window.location.href = 'Admin/super-admin.html';
            } else if (role === 'admin') {
                window.location.href = 'Admin/admin.html';
            } else if (role === 'cliente') {
                window.location.href = 'mis-proyectos.html';
            } else {
                // Promotores y Demostradoras
                window.location.href = 'dashboard.html';
            }
        }, 100);

    } else {
        msg.innerText = data.message || "Credenciales incorrectas";
    }
} catch (error) {
    console.error("Error crítico en login:", error);
    msg.innerText = "Error de conexión con el servidor";
} finally {
    btn.disabled = false;
    btn.innerText = "ENTRAR";
}


        // Limpiar mensajes al escribir de nuevo
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                document.getElementById('msg').innerText = "";
            });
        });
    </script>

</body>
</html>
