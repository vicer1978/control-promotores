<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historial Check-ins - StorePulse</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #F5F7FA;
}

header {
  background: #0B1F3A;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

th, td {
  padding: 10px;
  text-align: left;
  border-bottom: 1px solid #ddd;
}

th {
  background: #D4AF37;
  color: white;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: #D4AF37;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}
</style>
</head>

<body>

<header><h1>Historial de Check-ins</h1></header>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>Promotor</th>
        <th>Email</th>
        <th>Fecha</th>
        <th>Ubicación</th>
      </tr>
    </thead>
    <tbody id="historyTable"></tbody>
  </table>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<script>
// 🔹 URL del backend fija para APK
const BACKEND_URL = "https://storepulse.onrender.com";

async function loadHistory(){
  const agencyId = localStorage.getItem("agencyId");
  if(!agencyId){ window.location.href = "./login.html"; return; }

  try{
    const res = await fetch(`${BACKEND_URL}/checkins/${agencyId}`);
    if(!res.ok) throw new Error("Error al obtener historial");
    const data = await res.json();

    const tbody = document.getElementById("historyTable");
    tbody.innerHTML = "";

    (data || []).forEach(c => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${c.userId?.name || '-'}</td>
        <td>${c.userId?.email || '-'}</td>
        <td>${new Date(c.date).toLocaleString()}</td>
        <td>${c.lat || '-'}, ${c.lng || '-'}</td>
      `;
      tbody.appendChild(tr);
    });

  } catch(err){
    console.error(err);
    const tbody = document.getElementById("historyTable");
    tbody.innerHTML = `<tr><td colspan="4" style="color:red;">⚠️ No se pudo conectar al servidor</td></tr>`;
  }
}

function logout(){
  localStorage.clear();
  window.location.href="./login.html";
}

loadHistory();
</script>

</body>
</html>
