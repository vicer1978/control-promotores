<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin PRO - StorePulse</title>

<style>
body { margin:0; font-family:Arial; display:flex; background:#F5F7FA; }

.sidebar { width:240px; background:#0B1F3A; color:white; padding:20px; display:flex; flex-direction:column; }

.sidebar h2 { margin-bottom:20px; }

.sidebar button {
  width:100%;
  margin:8px 0;
  padding:12px;
  background:#D4AF37;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.main { flex:1; padding:20px; overflow-y:auto; }

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:10px; }

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.user { border-bottom:1px solid #eee; padding:10px 0; }

.kpi { font-size:22px; font-weight:bold; }

.store-list { display:flex; gap:15px; margin-top:10px; }

.store-column {
  flex:1;
  min-height:140px;
  padding:12px;
  border-radius:10px;
  background:#16a34a;
  color:white;
}

.store-column#assignedStores { background:#3b82f6; }

.store-item {
  background:#fcd34d;
  color:#0B1F3A;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  cursor:grab;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="sidebar">
  <h2>⚡ Admin PRO</h2>

  <button onclick="loadDashboard()">📊 Dashboard</button>
  <button id="btnResumen" onclick="loadAgencySummary()">📊 Resumen Agencias</button>
  <button onclick="loadUsers()">👤 Usuarios</button>
  <button onclick="loadCreateUser()">➕ Crear Usuario</button>

  <div id="menuAgencies">
    <button onclick="loadAgencies()">🏢 Agencias</button>
  </div>

  <div id="menuStores">
    <button onclick="loadStores()">🏬 Tiendas</button>
  </div>

  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="main" id="content"><h2>Bienvenido</h2></div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";
const userId = localStorage.getItem("userId");
const role = localStorage.getItem("role");
const agencyId = localStorage.getItem("agencyId");

let allUsers=[], allStores=[], allAgencies=[], currentUserStores={};

if(!userId) window.location.href="./login.html";

// 🔥 CONTROL DE VISIBILIDAD
if(role!=="superadmin") document.getElementById("menuAgencies").style.display="none";
if(role!=="admin" && role!=="superadmin") document.getElementById("menuStores").style.display="none";
if(role!=="superadmin") document.getElementById("btnResumen").style.display="none";

async function fetchWithAuth(url, options={}){
  options.headers = { ...(options.headers||{}), userId };
  const res = await fetch(url, options);
  return await res.json();
}

// ---------------- DASHBOARD
async function loadDashboard(){
  const users = await fetchWithAuth(`${BACKEND_URL}/users`);
  document.getElementById("content").innerHTML=`
    <h2>Dashboard</h2>
    <div class="grid">
      <div class="card"><div class="kpi">${users.length}</div>Total</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="promotor").length}</div>Promotores</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="demostradora").length}</div>Demostradoras</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="admin").length}</div>Admins</div>
    </div>
  `;
}

// ---------------- RESUMEN
async function loadAgencySummary(){
  const agencies = await fetchWithAuth(`${BACKEND_URL}/agencies`);
  const users = await fetchWithAuth(`${BACKEND_URL}/users`);

  let html=`<h2>Resumen de Agencias</h2><div class="card">`;

  agencies.forEach(a=>{
    const agencyUsers = users.filter(u=>u.agencyId && ((u.agencyId._id||u.agencyId)===a._id));
    html+=`
      <div class="user">
        <b>${a.name}</b><br>
        Total: ${agencyUsers.length}
      </div>
    `;
  });

  html+="</div>";
  document.getElementById("content").innerHTML=html;
}

// ---------------- USERS
async function loadUsers(){
  allUsers = await fetchWithAuth(`${BACKEND_URL}/users`);
  allStores = await fetchWithAuth(`${BACKEND_URL}/stores`);
  if(role==="superadmin") allAgencies = await fetchWithAuth(`${BACKEND_URL}/agencies`);
  renderUsers(allUsers);
}

function renderUsers(users){
  let html=`<div class="card"><h3>Usuarios</h3>`;

  users.forEach(u=>{
    html+=`
    <div class="user">
      <b>${u.name}</b> (${u.email})
    </div>`;
  });

  html+="</div>";
  document.getElementById("content").innerHTML=html;
}

// ---------------- CREATE USER
async function loadCreateUser(){
  document.getElementById("content").innerHTML=`
    <div class="card">
      <h3>Crear Usuario</h3>
      <input id="name" placeholder="Nombre">
      <input id="email" placeholder="Email">
      <input id="pass" placeholder="Password">
      <button onclick="createUser()">Crear</button>
    </div>
  `;
}

async function createUser(){
  await fetchWithAuth(`${BACKEND_URL}/admin/create-user`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      name:name.value,
      email:email.value,
      password:pass.value
    })
  });
  alert("Usuario creado");
}

// ---------------- AGENCIAS
async function loadAgencies(){
  const agencies = await fetchWithAuth(`${BACKEND_URL}/agencies`);
  document.getElementById("content").innerHTML =
    agencies.map(a=>`<div class="card">${a.name}</div>`).join("");
}

// ---------------- STORES
async function loadStores(){
  document.getElementById("content").innerHTML=`<div class="card">Stores</div>`;
}

// ---------------- LOGOUT
function logout(){
  localStorage.clear();
  window.location.href="./login.html";
}

</script>

</body>
</html>
