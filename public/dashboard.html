<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard - StorePulse</title>

<style>
:root { 
  --primary:#0B1F3A; 
  --secondary:#D4AF37; 
  --bg:#F5F7FA; 
  --text:#1A1A1A; 
}

body { 
  margin:0; 
  font-family:Arial, sans-serif; 
  display:flex; 
  min-height:100vh; 
  background:var(--bg); 
}

#sidebar { 
  width:240px; 
  background:var(--primary); 
  color:white; 
  padding:15px; 
  display:flex; 
  flex-direction:column; 
}

#sidebar p { font-weight:bold; margin:5px 0; }

#menu { list-style:none; padding:0; margin-top:15px; flex:1; }

#menu li { margin-bottom:10px; }

#menu li a { color:white; text-decoration:none; }

#content { flex:1; padding:20px; overflow-y:auto; }

.back { background:none; border:none; color:white; font-size:16px; cursor:pointer; margin-bottom:10px; }

.card { background:white; border-radius:10px; padding:15px; margin-bottom:15px; box-shadow:0 3px 8px rgba(0,0,0,0.1); }

.store { background:#1e293b; padding:8px; border-radius:6px; margin:5px 0; font-size:13px; }

button.logout { background:var(--secondary); border:none; padding:10px; color:white; border-radius:8px; cursor:pointer; margin-top:10px; }
</style>

</head>

<body>

<div id="sidebar">

  <button class="back" onclick="goBack()">⬅</button>

  <p id="welcome"></p>
  <p id="roleInfo"></p>

  <h4>🏬 Tiendas asignadas</h4>
  <div id="storesList"></div>

  <ul id="menu"></ul>

  <button class="logout" onclick="logout()">Cerrar sesión</button>

</div>

<div id="content">

  <h1>Bienvenido a StorePulse</h1>

  <div class="card">
    <h2>Métricas Generales</h2>
    <p>Total Usuarios: <span id="totalUsers">-</span></p>
    <p>Total Tiendas: <span id="totalStores">-</span></p>
    <p>Total Check-ins: <span id="totalCheckins">-</span></p>
    <p>Usuarios Activos: <span id="activeUsers">-</span></p>
  </div>

  <div class="card">
    <h2>Últimos Check-ins</h2>
    <ul id="recentCheckins"></ul>
  </div>

</div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";

const userId = localStorage.getItem("userId");
const role = localStorage.getItem("role");

// 🔥 DATOS USUARIO
const userName = localStorage.getItem("userName") || "Usuario";

document.getElementById("welcome").innerText = `👋 Bienvenido ${userName}`;
document.getElementById("roleInfo").innerText = `Rol: ${role}`;

// 🔥 MENÚ DINÁMICO MEJORADO
const menu = document.getElementById("menu");

if(role === "promotor") {

  menu.innerHTML = `
    <li><a href="ventas.html">Ventas</a></li>
    <li><a href="precios_marca.html">Precios</a></li>
    <li><a href="agotados.html">Agotados</a></li>
    <li><a href="preagotados.html">Preagotados</a></li>
    <li><a href="inventario.html">Inventarios</a></li>
    <li><a href="exhibiciones.html">Exhibiciones adicionales</a></li>
    <li><a href="precios_competencia.html">Precios competencia</a></li>
    <li><a href="upload.html">Fotos anaquel</a></li>
  `;

} else if(role === "demostradora") {

  menu.innerHTML = `
    <li><a href="report.html">Reporte</a></li>
    <li><a href="ventas.html">Ventas</a></li>
    <li><a href="precios_competencia.html">Precios competencia</a></li>
  `;

} else if(role === "admin") {

  menu.innerHTML = `
    <li><a href="users.html">Usuarios</a></li>
    <li><a href="agencies.html">Agencias</a></li>
    <li><a href="stores.html">Tiendas</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
  `;
}

// 🔥 TIENDAS ASIGNADAS
async function loadStores(){

  try{

    const res = await fetch(`${BACKEND_URL}/users/${userId}`);
    const user = await res.json();

    const storesContainer = document.getElementById("storesList");
    storesContainer.innerHTML = "";

    (user.stores || []).forEach(s=>{
      const div = document.createElement("div");
      div.className = "store";
      div.innerText = s.name;
      storesContainer.appendChild(div);
    });

  }catch{
    document.getElementById("storesList").innerHTML = "Error cargando tiendas";
  }

}

// 🔙
function goBack(){ window.history.back(); }

// 🔒
function logout(){ localStorage.clear(); window.location.href="./login.html"; }

// 📊 DASHBOARD
async function loadDashboard() {

  const agencyId = localStorage.getItem("agencyId");
  if(!agencyId) return;

  try {

    const res = await fetch(`${BACKEND_URL}/dashboard/${agencyId}`);
    const data = await res.json();

    document.getElementById("totalUsers").innerText = data.totalUsers || 0;
    document.getElementById("totalStores").innerText = data.totalStores || 0;
    document.getElementById("totalCheckins").innerText = data.totalCheckins || 0;
    document.getElementById("activeUsers").innerText = data.activeUsers || 0;

    const list = document.getElementById("recentCheckins");
    list.innerHTML = "";

    (data.recentCheckins || []).forEach(c => {
      const li = document.createElement("li");
      li.innerText = `${c.userId?.name || "-"} - ${new Date(c.date).toLocaleString()}`;
      list.appendChild(li);
    });

  } catch(err){
    console.error(err);
  }

}

// INIT
loadDashboard();
loadStores();

</script>

</body>
</html>
