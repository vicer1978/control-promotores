<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - StorePulse</title>

<style>
:root {
  --primary:#0B1F3A;
  --secondary:#D4AF37;
  --bg:#F5F7FA;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:360px;
  background:#fff;
  padding:30px;
  border-radius:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.logo{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  color:var(--primary);
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:var(--secondary);
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.links{
  text-align:center;
  margin-top:10px;
}

.links a{
  display:block;
  margin:5px 0;
  color:var(--primary);
  font-size:13px;
  cursor:pointer;
}

.error{
  color:red;
  font-size:12px;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">StorePulse</div>

  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">

  <button onclick="login()">Ingresar</button>

  <div class="links">
    <a href="./forgot.html">¿Olvidaste tu contraseña?</a>
    <a href="./register.html">¿No tienes cuenta? Regístrate</a>
  </div>

  <div class="error" id="error"></div>

</div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";

async function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const error = document.getElementById("error");

  error.innerText = "";

  if(!email || !password){
    error.innerText = "⚠️ Completa los campos";
    return;
  }

  try{

    // 🔥 Wake up backend
    await fetch(BACKEND_URL);

    const res = await fetch(`${BACKEND_URL}/login`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if(!res.ok){
      error.innerText = data.message;
      return;
    }

    localStorage.setItem("userId", data.userId);
    localStorage.setItem("agencyId", data.agencyId);
    localStorage.setItem("role", data.role);

    window.location.href = "./app.html";

  }catch(err){
    console.error(err);
    error.innerText = "❌ Error de conexión";
  }
}

</script>

</body>
</html>
