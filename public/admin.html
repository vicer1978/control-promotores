<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin PRO - StorePulse</title>
<style>
body { margin:0; font-family:Arial; display:flex; background:#F5F7FA; }
.sidebar { width:240px; background:#0B1F3A; color:white; padding:20px; }
.sidebar h2 { margin-bottom:20px; }
.sidebar button { width:100%; margin:8px 0; padding:12px; background:#D4AF37; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold; }
.main { flex:1; padding:20px; }
.card { background:white; padding:15px; border-radius:12px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
.grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:10px; }
input, select { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ccc; }
.user { border-bottom:1px solid #eee; padding:10px 0; }
.small { padding:5px 10px; margin-top:5px; background:red; color:white; border:none; border-radius:6px; cursor:pointer; }
.kpi { font-size:22px; font-weight:bold; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>⚡ Admin PRO</h2>
  <button onclick="loadDashboard()">📊 Dashboard</button>
  <button onclick="loadUsers()">👤 Usuarios</button>
  <button onclick="loadCreateUser()">➕ Crear Usuario</button>
  <div id="menuAgencies">
    <button onclick="loadAgencies()">🏢 Agencias</button>
  </div>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="main" id="content">
  <h2>Bienvenido</h2>
</div>

<script>
const BACKEND_URL = "https://storepulse.onrender.com";
const userId = localStorage.getItem("userId");
const role = localStorage.getItem("role");
const agencyId = localStorage.getItem("agencyId");

let allUsers = [];
let allAgencies = [];
let allStores = [];

// 🔐 SEGURIDAD
if(!userId){ window.location.href = "./login.html"; }

// 🔥 CONTROL UI POR ROL
if(role !== "superadmin"){ document.getElementById("menuAgencies").style.display = "none"; }

// ---------------- FETCH CON HEADER ----------------
async function fetchWithAuth(url, options={}) {
  options.headers = { ...(options.headers||{}), userId };
  const res = await fetch(url, options);
  if(!res.ok) throw new Error("Error al obtener datos");
  return await res.json();
}

// ---------------- DASHBOARD ----------------
async function loadDashboard(){
  let users;
  try { users = await fetchWithAuth(`${BACKEND_URL}/users`); } 
  catch(err){ alert("Error cargando usuarios"); return; }

  document.getElementById("content").innerHTML = `
    <h2>Dashboard</h2>
    <div class="grid">
      <div class="card"><div class="kpi">${users.length}</div>Total usuarios</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="promotor").length}</div>Promotores</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="demostradora").length}</div>Demostradoras</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="admin").length}</div>Admins</div>
    </div>
  `;
}

// ---------------- USUARIOS ----------------
async function loadUsers(){
  try {
    allUsers = await fetchWithAuth(`${BACKEND_URL}/users`);
    if(role==="superadmin"){ allAgencies = await fetchWithAuth(`${BACKEND_URL}/agencies`); }
    allStores = await fetchWithAuth(`${BACKEND_URL}/stores`);
    renderUsers(allUsers);
  } catch(err){ alert("Error cargando usuarios"); }
}

function renderUsers(users){
  let html = `<div class="card">
      <h3>Usuarios</h3>
      <input placeholder="Buscar..." oninput="filterUsers(this.value)">
  `;

  users.forEach(u=>{
    let agencySelect = "";
    let storeSelect = "";

    // 🔹 Agencia
    if(role==="superadmin"){
      let options = `<option value="">Sin agencia</option>`;
      allAgencies.forEach(a=>{
        const selected = (u.agencyId && (u.agencyId._id || u.agencyId) === a._id) ? "selected" : "";
        options += `<option value="${a._id}" ${selected}>${a.name}</option>`;
      });
      agencySelect = `<br><b>🏢 Agencia:</b>
        <select onchange="changeAgency('${u._id}', this.value)">${options}</select>`;
    }

    // 🔹 Tiendas (solo promotor o demostradora)
    if(["promotor","demostradora"].includes(u.role)){
      let storeOptions = allStores
        .filter(s => role==="superadmin" || s.agencyId?._id == agencyId)
        .map(s => {
          const selected = u.stores?.some(us => us._id == s._id) ? "selected" : "";
          return `<option value="${s._id}" ${selected}>${s.name}</option>`;
        }).join("");
      storeSelect = `<br><b>🏪 Tiendas:</b>
        <select multiple onchange="changeStores('${u._id}', Array.from(this.selectedOptions).map(o=>o.value))">${storeOptions}</select>`;
    }

    html += `<div class="user">
      <b>${u.name}</b> (${u.email})<br>
      <b>Rol:</b>
      <select onchange="changeRole('${u._id}', this.value)">
        <option value="promotor" ${u.role==="promotor"?"selected":""}>Promotor</option>
        <option value="demostradora" ${u.role==="demostradora"?"selected":""}>Demostradora</option>
        <option value="admin" ${u.role==="admin"?"selected":""}>Admin</option>
      </select>
      ${agencySelect}
      ${storeSelect}
      <br>
      <button class="small" onclick="deleteUser('${u._id}')">Eliminar</button>
    </div>`;
  });

  // 🔹 Crear Tienda
  if(role==="superadmin" || role==="admin"){
    html += `<div class="card">
      <h3>Crear Tienda</h3>
      <input id="newStoreName" placeholder="Nombre de la tienda">
      <input id="newStoreAddress" placeholder="Dirección">
      <input id="newStoreLat" placeholder="Latitud">
      <input id="newStoreLng" placeholder="Longitud">
      <button onclick="createStore()">Crear Tienda</button>
    </div>`;
  }

  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

function filterUsers(term){
  term = term.toLowerCase();
  renderUsers(allUsers.filter(u => u.name.toLowerCase().includes(term) || u.email.toLowerCase().includes(term)));
}

// ---------------- CREAR USUARIO ----------------
async function loadCreateUser(){
  allAgencies = await fetchWithAuth(`${BACKEND_URL}/agencies`);
  allStores = await fetchWithAuth(`${BACKEND_URL}/stores`);

  let agencyOptions = `<option value="">Sin agencia</option>`;
  allAgencies.forEach(a=> agencyOptions += `<option value="${a._id}">${a.name}</option>`);

  let storeOptions = allStores.map(s => `<option value="${s._id}">${s.name}</option>`).join("");

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Crear Usuario</h3>
      <input id="name" placeholder="Nombre">
      <input id="email" placeholder="Email">
      <input id="password" placeholder="Password">
      <label>Rol</label>
      <select id="role" onchange="toggleStores()">
        <option value="promotor">Promotor</option>
        <option value="demostradora">Demostradora</option>
        <option value="admin">Admin</option>
      </select>
      <br><label>Agencia</label>
      <select id="agencyId">${agencyOptions}</select>
      <br><div id="storeSelection">
        <label>Tiendas</label>
        <select id="storeIds" multiple>${storeOptions}</select>
      </div>
      <button onclick="createUser()">Crear</button>
    </div>
  `;
  toggleStores();
}

function toggleStores(){
  const roleVal = document.getElementById("role").value;
  document.getElementById("storeSelection").style.display = ["promotor","demostradora"].includes(roleVal) ? "block" : "none";
}

async function createUser(){
  const selectedStores = Array.from(document.getElementById("storeIds")?.selectedOptions||[]).map(o=>o.value);
  const body = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: document.getElementById("role").value,
    agencyId: document.getElementById("agencyId")?.value || null,
    storeIds: selectedStores
  };
  try{
    await fetchWithAuth(`${BACKEND_URL}/admin/create-user`, {
      method:"POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify(body)
    });
    alert("Usuario creado");
    loadUsers();
  } catch(err){ alert("Error creando usuario"); console.error(err); }
}

// ---------------- ACCIONES ----------------
async function changeRole(id, role){
  await fetchWithAuth(`${BACKEND_URL}/users/${id}/role`, {
    method:"PUT",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({ role })
  });
}

async function changeAgency(id, agencyId){
  await fetchWithAuth(`${BACKEND_URL}/users/${id}/agency`, {
    method:"PUT",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({ agencyId })
  });
  alert("Agencia actualizada");
}

async function changeStores(userId, storeIds){
  try{
    await fetchWithAuth(`${BACKEND_URL}/users/${userId}/stores`, {
      method:"PUT",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ storeIds })
    });
    alert("Tiendas actualizadas");
  } catch(err){ console.error(err); alert("Error actualizando tiendas"); }
}

async function deleteUser(id){
  if(!confirm("¿Eliminar usuario?")) return;
  await fetchWithAuth(`${BACKEND_URL}/users/${id}`, { method:"DELETE" });
  loadUsers();
}

// ---------------- TIENDAS ----------------
async function createStore(){
  const name = document.getElementById("newStoreName").value;
  const address = document.getElementById("newStoreAddress").value;
  const lat = parseFloat(document.getElementById("newStoreLat").value);
  const lng = parseFloat(document.getElementById("newStoreLng").value);
  if(!name || !address || isNaN(lat) || isNaN(lng)){ alert("Completa todos los campos correctamente"); return; }

  let body = { name, address, lat, lng };
  if(role!=="superadmin") body.agencyId = agencyId;

  await fetchWithAuth(`${BACKEND_URL}/stores`, {
    method:"POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify(body)
  });
  alert("Tienda creada");
  loadUsers();
}

// ---------------- AGENCIAS ----------------
async function loadAgencies(){
  if(role!=="superadmin") return;
  let agencies = await fetchWithAuth(`${BACKEND_URL}/agencies`);
  let html = `<div class="card"><h3>Agencias</h3>`;
  agencies.forEach(a=> html+=`<p>${a.name}</p>`);
  html += `<input id="newAgency" placeholder="Nueva agencia"><button onclick="createAgency()">Crear</button></div>`;
  document.getElementById("content").innerHTML = html;
}

async function createAgency(){
  await fetchWithAuth(`${BACKEND_URL}/agencies`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name: document.getElementById("newAgency").value })
  });
  loadAgencies();
}

// ---------------- LOGOUT ----------------
function logout(){
  localStorage.clear();
  window.location.href = "./login.html";
}
</script>

</body>
</html>
