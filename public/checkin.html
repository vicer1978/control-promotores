<!DOCTYPE html>
<html>
<body>

<h2>Check-in Promotor</h2>

Lat: <input id="lat" type="number" step="any" placeholder="Latitud">
<br><br>
Lng: <input id="lng" type="number" step="any" placeholder="Longitud">
<br><br>
<button onclick="checkin()">Hacer Check-in</button>
<br><br>
<a href="upload.html">Subir foto</a>

<script>
const API_URL = "https://storepulse.onrender.com";

async function checkin(){
  const lat = parseFloat(document.getElementById("lat").value);
  const lng = parseFloat(document.getElementById("lng").value);

  try {
    const res = await fetch(`${API_URL}/checkin`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ lat, lng })
    });

    const data = await res.json();
    alert(data.message);

  } catch (err) {
    alert("Error conectando con la API");
    console.error(err);
  }
}
</script>

</body>
</html>
