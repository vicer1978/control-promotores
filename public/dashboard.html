<script>
    const BACKEND_URL = "https://storepulse.onrender.com";
    const userId = localStorage.getItem("userId");
    // Cambiado a 'name' y 'userRole' para coincidir con tu login corregido
    const name = localStorage.getItem("name") || "Usuario";
    const role = localStorage.getItem("userRole") || "Promotor";

    let selectedStore = null;

    // Protección de sesión
    if(!userId) window.location.href="./login.html";

    // UI Inicial
    document.getElementById("userName").innerText = name;
    document.getElementById("userRole").innerText = role.toUpperCase();
    document.getElementById("greeting").innerText = `¡Hola, ${name.split(' ')[0]}!`;

    function toggleMenu(){
        document.getElementById("drawer").classList.toggle("open");
    }

    async function loadStores(){
        const container = document.getElementById("storesContainer");
        try {
            // CORRECCIÓN CRÍTICA: Cambié la ruta de /users/${userId}/stores a solo /users/${userId}
            // para que traiga el objeto de usuario completo que ya tiene las tiendas adentro.
            const res = await fetch(`${BACKEND_URL}/users/${userId}`, {
                headers: { "userId": userId }
            });

            if(!res.ok) throw new Error("Fallo en servidor");
            const userData = await res.json();
            
            // Extraemos el array de tiendas del usuario
            const stores = userData.stores || [];

            if (stores.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:40px;">
                        <span style="font-size:40px;">🏪</span>
                        <h3>No tienes tiendas asignadas</h3>
                        <p style="color:#64748b">Pide a tu supervisor que te asigne una sucursal en el panel Admin.</p>
                    </div>`;
                return;
            }

            container.innerHTML = stores.map(s => `
                <div class="store-card" onclick='openModal(${JSON.stringify(s)})'>
                    <div class="store-info">
                        <b>${s.name}</b>
                        <small>${s.address || "Ver mapa para dirección"}</small>
                    </div>
                    <div class="arrow">➔</div>
                </div>
            `).join("");

        } catch (err) {
            console.error(err);
            container.innerHTML = "<h3>⚠️ Error de conexión</h3><p>No pudimos cargar tus tiendas. Revisa tu internet.</p>";
        }
    }

    function openModal(store){
        selectedStore = store;
        document.getElementById("storeNameDisplay").innerText = store.name;
        document.getElementById("modal").style.display = "flex";
    }

    function closeModal(){
        document.getElementById("modal").style.display = "none";
    }

    function startCheckin(){
        const btn = document.getElementById("btnCheckin");
        
        if(!navigator.geolocation){
            return alert("GPS no disponible en este navegador.");
        }

        btn.innerText = "LOCALIZANDO...";
        btn.disabled = true;

        navigator.geolocation.getCurrentPosition(async pos => {
            const { latitude, longitude } = pos.coords;

            try {
                const res = await fetch(`${BACKEND_URL}/checkin`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "userId": userId },
                    body: JSON.stringify({
                        storeId: selectedStore._id,
                        lat: latitude,
                        lng: longitude
                    })
                });

                const data = await res.json();

                if(res.ok){
                    localStorage.setItem("activeStoreId", selectedStore._id);
                    localStorage.setItem("activeStoreName", selectedStore.name);
                    
                    alert(`✅ ¡Entrada exitosa en ${selectedStore.name}!`);
                    // Asegúrate de que home.html exista, si no, cámbialo a donde quieras que vaya el usuario
                    window.location.href = "./home.html"; 
                } else {
                    alert("❌ " + (data.error || data.message || "Error al marcar entrada"));
                    resetBtn(btn);
                }
            } catch (err) {
                alert("Error de red al intentar marcar entrada.");
                resetBtn(btn);
            }
        }, err => {
            alert("Error: Activa el GPS de tu celular para poder entrar.");
            resetBtn(btn);
        }, { enableHighAccuracy: true });
    }

    function resetBtn(btn){
        btn.innerText = "INICIAR OPERACIÓN";
        btn.disabled = false;
    }

    function logout(){
        localStorage.clear();
        window.location.href="./login.html";
    }

    window.onload = loadStores;
</script>
