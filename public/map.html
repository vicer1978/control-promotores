<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa - StorePulse</title>

<style>
:root {
  --primary: #0B1F3A;
  --secondary: #D4AF37;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.header {
  background: var(--primary);
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  position: relative;
}

.back {
  position: absolute;
  left: 10px;
  top: 15px;
  background: transparent;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#map {
  height: calc(100vh - 60px);
  width: 100%;
}

.actions {
  position: absolute;
  bottom: 20px;
  left: 20px;
  right: 20px;
}

.button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: var(--secondary);
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <button class="back" onclick="goBack()">⬅</button>
  Mapa de ubicación
</div>

<div id="map"></div>

<div class="actions">
  <button class="button" onclick="usarUbicacion()">Usar esta ubicación</button>
</div>

<script>
let map;
let marker;
let userPosition;

// 🔹 Inicializar mapa y geolocalización
function initMap() {
  if (!navigator.geolocation) {
    alert("⚠️ Geolocalización no disponible");
    return;
  }

  navigator.geolocation.getCurrentPosition(position => {
    userPosition = {
      lat: position.coords.latitude,
      lng: position.coords.longitude
    };

    map = new google.maps.Map(document.getElementById("map"), {
      center: userPosition,
      zoom: 16
    });

    marker = new google.maps.Marker({
      position: userPosition,
      map: map,
      draggable: true
    });

    // Actualizar posición al mover marcador
    marker.addListener("dragend", function(event) {
      userPosition = {
        lat: event.latLng.lat(),
        lng: event.latLng.lng()
      };
    });

  }, error => {
    alert("⚠️ No se pudo obtener la ubicación");
  });
}

// 🔹 Guardar ubicación en localStorage
function usarUbicacion() {
  if (!userPosition) {
    alert("⚠️ No hay ubicación seleccionada");
    return;
  }

  localStorage.setItem("lat", userPosition.lat);
  localStorage.setItem("lng", userPosition.lng);

  alert("📍 Ubicación guardada");
  window.location.href = "./checkin.html";
}

// 🔹 Regresar
function goBack() {
  window.location.href = "./dashboard.html";
}
</script>

<!-- GOOGLE MAPS -->
<script src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY&callback=initMap" async defer></script>

</body>
</html>
