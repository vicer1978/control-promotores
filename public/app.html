<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>StorePulse App</title>

<style>
:root {
  --primary: #0B1F3A;
  --secondary: #D4AF37;
  --bg: #F5F7FA;
}

body {
  margin: 0;
  font-family: Arial;
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: var(--primary);
  color: white;
  padding: 20px;
}

.sidebar h2 { text-align: center; }

.sidebar small {
  display:block;
  text-align:center;
  margin-bottom:15px;
  color:#ccc;
}

.sidebar button {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: var(--secondary);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* MAIN */
.main {
  flex: 1;
  background: var(--bg);
  padding: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="sidebar">

  <h2>StorePulse</h2>
  <small id="userInfo"></small>

  <!-- 🔥 TIENDAS -->
  <div id="storesMenu"></div>

  <button onclick="goCheckin()">📍 Check-in</button>
  <button onclick="loadHistory()">📋 Historial</button>
  <button onclick="loadRanking()">🏆 Ranking</button>

  <!-- SOLO ADMIN -->
  <div id="reportMenu">
    <button onclick="loadReport()">📄 Reportes</button>
  </div>

  <button onclick="logout()">🚪 Salir</button>

</div>

<div class="main" id="content">
  <h2>Bienvenido</h2>
</div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";

const userId = localStorage.getItem("userId");
const role = localStorage.getItem("role");
const agencyId = localStorage.getItem("agencyId");
const userName = localStorage.getItem("name");


// 🔐 VALIDACIÓN
(function(){

  if(!userId){
    window.location.href = "./login.html";
    return;
  }

  if(role !== "admin"){
    document.getElementById("reportMenu").style.display = "none";
  }

  document.getElementById("userInfo").innerText =
    `Bienvenido ${userName || "Usuario"} | ${role}`;

  loadUserStores();

})();


// 🔥 CARGAR TIENDAS
async function loadUserStores(){

  try{

    const res = await fetch(`${BACKEND_URL}/users`,{
      headers:{ userId }
    });

    const users = await res.json();
    const user = users.find(u => u._id === userId);

    const stores = user?.stores || [];

    let html = `<h3>🏬 Mis tiendas</h3>`;

    stores.forEach(s=>{
      html += `
        <button onclick="selectStore('${s._id}','${s.name}')">
          ${s.name}
        </button>
      `;
    });

    document.getElementById("storesMenu").innerHTML = html;

  }catch(err){
    console.log("Error cargando tiendas", err);
  }

}


// 🔥 SELECCIONAR TIENDA
function selectStore(id, name){

  localStorage.setItem("storeId", id);

  let menu = "";

  if(role === "demostradora"){
    menu = `
      <button onclick="goPage('report.html')">📊 Reporte</button>
      <button onclick="goPage('degustacion.html')">🍽 Degustación</button>
      <button onclick="goPage('precios_competencia.html')">💲 Competencia</button>
    `;
  }

  if(role === "promotor"){
    menu = `
      <button onclick="goPage('ventas.html')">💰 Ventas</button>
      <button onclick="goPage('precios_marca.html')">💲 Precios</button>
      <button onclick="goPage('agotados.html')">❌ Agotados</button>
      <button onclick="goPage('preagotados.html')">⚠️ Preagotados</button>
      <button onclick="goPage('inventario.html')">📦 Inventario</button>
      <button onclick="goPage('exhibiciones.html')">🧾 Exhibiciones</button>
      <button onclick="goPage('precios_competencia.html')">🏷 Competencia</button>
      <button onclick="goPage('upload.html')">📸 Fotos</button>
    `;
  }

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>🏬 ${name}</h3>
      <p>Tienda seleccionada</p>
      <button onclick="goCheckin()">📍 Hacer Check-in</button>
    </div>

    <div class="card">
      <h3>📋 Operación</h3>
      ${menu}
    </div>
  `;
}


// 🔥 CHECKIN
function goCheckin(){

  const storeId = localStorage.getItem("storeId");

  if(!storeId){
    return showError("⚠️ Selecciona una tienda primero");
  }

  window.location.href = "./checkin.html";
}


// 🔥 HISTORIAL
async function loadHistory(){

  if(!agencyId) return showError("⚠️ Sin agencia");

  const res = await fetch(`${BACKEND_URL}/checkins/${agencyId}`);
  const data = await res.json();

  let html = `<div class="card"><h3>Historial</h3>`;

  data.forEach(c=>{
    html += `<p>${new Date(c.date).toLocaleString()}</p>`;
  });

  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}


// 🔥 RANKING
async function loadRanking(){

  if(!agencyId) return showError("⚠️ Sin agencia");

  const res = await fetch(`${BACKEND_URL}/stats/ranking/${agencyId}`);
  const data = await res.json();

  let html = `<div class="card"><h3>Ranking</h3>`;

  data.forEach((r,i)=>{
    html += `<p>${i+1}. ${r._id.name} - ${r.total}</p>`;
  });

  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}


// 🔥 REPORTES
function loadReport(){

  if(role !== "admin") return showError("❌ No autorizado");

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Reporte</h3>
      <input type="date" id="start">
      <input type="date" id="end">
      <button onclick="generateReport()">Generar</button>
    </div>
  `;
}

function generateReport(){
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  window.open(`${BACKEND_URL}/report/${agencyId}?start=${start}&end=${end}`);
}


// 🔥 UTIL
function goPage(page){
  window.location.href = "./" + page;
}

function showError(msg){
  document.getElementById("content").innerHTML =
    `<div class="card" style="color:red;">${msg}</div>`;
}


// 🔥 LOGOUT
function logout(){
  localStorage.clear();
  window.location.href="./login.html";
}

</script>

</body>
</html>
