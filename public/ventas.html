<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>
<!-- Misma hoja de estilo que inventario -->
</head>
<body>
<div id="sidebar">
  <button class="back" onclick="goBack()">⬅</button>
  <p>Hola, <span id="userName"></span></p>
  <ul id="menu"></ul>
</div>
<div id="content">
  <h2>Ventas</h2>
  <div id="pageContent">
    <label>Producto:</label><input type="text" id="producto">
    <label>Cantidad vendida:</label><input type="number" id="cantidad">
    <button class="button" onclick="enviarVentas()">📤 Enviar Ventas</button>
  </div>
</div>
<script type="module">
import { Camera, CameraResultType, CameraSource } from 'https://cdn.jsdelivr.net/npm/@capacitor/camera/dist/index.mjs';
import { Geolocation } from 'https://cdn.jsdelivr.net/npm/@capacitor/geolocation/dist/index.mjs';
function goBack(){window.history.back();}
document.getElementById("userName").innerText = localStorage.getItem("userEmail") || "Usuario";
const role = localStorage.getItem("role");
const menu = document.getElementById("menu");
if(role==="promotor"){menu.innerHTML=`<li><a href="inventario.html">Inventario</a></li><li><a href="agotados.html">Agotados</a></li><li><a href="preagotados.html">Preagotados</a></li><li><a href="exhibiciones.html">Exhibiciones</a></li><li><a href="ventas.html">Ventas</a></li>`;}
else if(role==="demostradora"){menu.innerHTML=`<li><a href="inventario_inicial.html">Inventario Inicial</a></li><li><a href="ventas.html">Ventas</a></li><li><a href="inventario_final.html">Inventario Final</a></li><li><a href="precios_marca.html">Precios Marca</a></li><li><a href="precios_competencia.html">Precios Competencia</a></li>`;}

async function requestPermissions(){try{await Geolocation.requestPermissions({permissions:['location']}); await Camera.requestPermissions();}catch(e){console.warn("Permisos no otorgados",e);}}
async function takePhoto(){await requestPermissions(); const photo = await Camera.getPhoto({resultType:CameraResultType.Base64,source:CameraSource.Camera,quality:80}); return photo.base64String;}

async function enviarVentas(){
  const producto=document.getElementById("producto").value;
  const cantidad=document.getElementById("cantidad").value;
  if(!producto||!cantidad){alert("Completa todos los campos"); return;}
  const base64 = await takePhoto();
  const res = await fetch("https://storepulse.onrender.com/ventas",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({producto,cantidad,photo:base64,userId:localStorage.getItem("userId")})});
  const data = await res.json();
  alert(data.message||"Ventas enviadas");
}
</script>
</body>
</html>
