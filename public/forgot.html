<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Recuperar contraseña</title>

<style>
body{
  font-family:Arial;
  background:#F5F7FA;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#fff;
  padding:30px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

input,button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
}

button{
  background:#D4AF37;
  color:white;
  border:none;
}

#msg{
  text-align:center;
  font-size:13px;
}
</style>
</head>

<body>

<div class="box">

<h3>Recuperar contraseña</h3>

<input id="email" placeholder="Correo">

<button onclick="send()">Enviar</button>

<p id="msg"></p>

<a href="./login.html">Volver</a>

</div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";

async function send(){

  const email = document.getElementById("email").value;

  const res = await fetch(`${BACKEND_URL}/forgot-password`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  document.getElementById("msg").innerText = data.message;
}

</script>

</body>
</html>
