<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido a StorePulse</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #003366, #0055a5);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      color: #ffd700;
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 220px;
    }

    .buttons a, .buttons button {
      text-decoration: none;
      background-color: #ffd700;
      color: #003366;
      padding: 12px 25px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .buttons a:hover, .buttons button:hover {
      background-color: #ffc300;
    }

  </style>
</head>
<body>

  <h1>Bienvenido a StorePulse</h1>
  <p>Selecciona una opción para continuar:</p>

  <div class="buttons" id="btnContainer">
    <!-- Los botones se agregarán según rol -->
  </div>

  <script>
    // Obtener rol y userId desde localStorage
    const role = localStorage.getItem("role") || "user";
    const userId = localStorage.getItem("userId");

    const container = document.getElementById("btnContainer");

    // Botones comunes para todos los usuarios
    const userButtons = [
      { text: "Registro Usuario", href: "register.html" },
      { text: "Login", href: "login.html" },
      { text: "Check-in", href: "checkin.html" },
      { text: "Subir Foto", href: "upload.html" },
    ];

    // Botones adicionales para admin
    const adminButtons = [
      { text: "Panel Admin", href: "admin.html" },
      { text: "Tiendas", href: "stores.html" }
    ];

    // Función para crear botones
    function crearBoton({text, href}){
      const btn = document.createElement(href ? "a" : "button");
      btn.textContent = text;
      if(href) btn.href = href;
      return btn;
    }

    // Agregar botones según rol
    if(role === "admin"){
      [...userButtons, ...adminButtons].forEach(b => container.appendChild(crearBoton(b)));
    } else {
      userButtons.forEach(b => container.appendChild(crearBoton(b)));
    }

    // Botón cerrar sesión
    const logoutBtn = document.createElement("button");
    logoutBtn.textContent = "Cerrar sesión";
    logoutBtn.onclick = () => {
      localStorage.removeItem("role");
      localStorage.removeItem("userId");
      window.location = "login.html";
    }
    container.appendChild(logoutBtn);

  </script>
</body>
</html>
