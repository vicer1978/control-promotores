<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Admin PRO - StorePulse</title>

<style>
body { margin:0; font-family:Arial; display:flex; background:#F5F7FA; }

.sidebar {
  width:240px;
  background:#0B1F3A;
  color:white;
  padding:20px;
}

.sidebar h2 { margin-bottom:20px; }

.sidebar button {
  width:100%;
  margin:8px 0;
  padding:12px;
  background:#D4AF37;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.main { flex:1; padding:20px; }

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.user {
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.small {
  padding:5px 10px;
  margin-top:5px;
  background:red;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.kpi {
  font-size:22px;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="sidebar">
  <h2>⚡ Admin PRO</h2>
  <button onclick="loadDashboard()">📊 Dashboard</button>
  <button onclick="loadUsers()">👤 Usuarios</button>
  <button onclick="loadCreateUser()">➕ Crear Usuario</button>
  <button onclick="loadAgencies()">🏢 Agencias</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="main" id="content">
  <h2>Bienvenido</h2>
</div>

<script>

const BACKEND_URL = "https://storepulse.onrender.com";
const userId = localStorage.getItem("userId");
const role = localStorage.getItem("role");

// 🔐 PROTECCIÓN
if(!userId){
  window.location.href = "./login.html";
}

if(role !== "admin" && role !== "superadmin"){
  alert("No autorizado");
  window.location.href = "./login.html";
}

// ---------------- DASHBOARD ----------------

async function loadDashboard(){

  const res = await fetch(`${BACKEND_URL}/users`,{
    headers:{ userId }
  });

  const users = await res.json();

  document.getElementById("content").innerHTML = `
    <h2>Dashboard</h2>
    <div class="grid">
      <div class="card"><div class="kpi">${users.length}</div>Total usuarios</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="promotor").length}</div>Promotores</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="demostradora").length}</div>Demostradoras</div>
      <div class="card"><div class="kpi">${users.filter(u=>u.role==="admin").length}</div>Admins</div>
    </div>
  `;
}

// ---------------- USUARIOS ----------------

let allUsers = [];

async function loadUsers(){

  const res = await fetch(`${BACKEND_URL}/users`,{
    headers:{ userId }
  });

  allUsers = await res.json();
  renderUsers(allUsers);
}

function renderUsers(users){

  let html = `
    <div class="card">
      <h3>Usuarios</h3>

      <input placeholder="Buscar..." oninput="filterUsers(this.value)">
      
      <select onchange="filterByRole(this.value)">
        <option value="">Todos</option>
        <option value="promotor">Promotor</option>
        <option value="demostradora">Demostradora</option>
        <option value="admin">Admin</option>
      </select>
  `;

  users.forEach(u=>{
    html += `
      <div class="user">
        <b>${u.name}</b> (${u.email})<br>

        Rol:
        <select onchange="changeRole('${u._id}', this.value)">
          <option value="promotor" ${u.role==="promotor"?"selected":""}>Promotor</option>
          <option value="demostradora" ${u.role==="demostradora"?"selected":""}>Demostradora</option>
          <option value="admin" ${u.role==="admin"?"selected":""}>Admin</option>
          <option value="superadmin" ${u.role==="superadmin"?"selected":""}>Super Admin</option>
        </select>

        <br>
        <button class="small" onclick="deleteUser('${u._id}')">Eliminar</button>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

// FILTROS

function filterUsers(text){
  const filtered = allUsers.filter(u =>
    u.name.toLowerCase().includes(text.toLowerCase()) ||
    u.email.toLowerCase().includes(text.toLowerCase())
  );
  renderUsers(filtered);
}

function filterByRole(role){
  if(!role) return renderUsers(allUsers);
  renderUsers(allUsers.filter(u => u.role === role));
}

// ---------------- CREAR USUARIO ----------------

async function loadCreateUser(){

  const agenciesRes = await fetch(`${BACKEND_URL}/agencies`,{
    headers:{ userId }
  });

  const agencies = await agenciesRes.json();

  let options = "";
  agencies.forEach(a=>{
    options += `<option value="${a._id}">${a.name}</option>`;
  });

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Crear Usuario</h3>

      <input id="name" placeholder="Nombre">
      <input id="email" placeholder="Email">
      <input id="password" placeholder="Password">

      <label>Rol</label>
      <select id="role" onchange="toggleAgency()">
        <option value="promotor">Promotor</option>
        <option value="demostradora">Demostradora</option>
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>

      <div id="agencyContainer">
        <label>Agencia</label>
        <select id="agencyId">${options}</select>
      </div>

      <button onclick="createUser()">Crear</button>
    </div>
  `;

  toggleAgency();
}

function toggleAgency(){
  const role = document.getElementById("role").value;
  const agencyDiv = document.getElementById("agencyContainer");

  if(role === "admin" || role === "superadmin"){
    agencyDiv.style.display = "none";
  } else {
    agencyDiv.style.display = "block";
  }
}

// ---------------- CREAR ----------------

async function createUser(){

  const roleSel = document.getElementById("role").value;

  const body = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: roleSel
  };

  if(roleSel !== "admin" && roleSel !== "superadmin"){
    body.agencyId = document.getElementById("agencyId").value;
  }

  await fetch(`${BACKEND_URL}/admin/create-user`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "userId": userId
    },
    body: JSON.stringify(body)
  });

  alert("Usuario creado");
  loadUsers();
}

// ---------------- ROLE ----------------

async function changeRole(id, role){

  await fetch(`${BACKEND_URL}/users/${id}/role`,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "userId": userId
    },
    body: JSON.stringify({ role })
  });
}

// ---------------- DELETE ----------------

async function deleteUser(id){

  if(!confirm("¿Eliminar usuario?")) return;

  await fetch(`${BACKEND_URL}/users/${id}`,{
    method:"DELETE",
    headers:{ userId }
  });

  loadUsers();
}

// ---------------- AGENCIAS ----------------

async function loadAgencies(){

  const res = await fetch(`${BACKEND_URL}/agencies`,{
    headers:{ userId }
  });

  const agencies = await res.json();

  let html = `<div class="card"><h3>Agencias</h3>`;

  agencies.forEach(a=>{
    html += `<p>${a.name}</p>`;
  });

  html += `
    <input id="newAgency" placeholder="Nueva agencia">
    <button onclick="createAgency()">Crear</button>
  </div>`;

  document.getElementById("content").innerHTML = html;
}

async function createAgency(){

  await fetch(`${BACKEND_URL}/agencies`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "userId": userId
    },
    body: JSON.stringify({
      name: document.getElementById("newAgency").value
    })
  });

  loadAgencies();
}

// ---------------- LOGOUT ----------------

function logout(){
  localStorage.clear();
  window.location.href = "./login.html";
}

</script>

</body>
</html>
