<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Super Admin - StorePulse</title>
    <style>
        :root { --primary: #0B1F3A; --gold: #D4AF37; --bg: #F5F7FA; --text: #1e293b; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; color: var(--text); }
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; padding: 20px; position: fixed; display: flex; flex-direction: column; box-sizing: border-box; z-index: 100; }
        .sidebar h2 { font-size: 1.4rem; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .sidebar button { width: 100%; text-align: left; background: none; border: none; color: #94a3b8; padding: 14px; cursor: pointer; border-radius: 8px; margin: 4px 0; font-size: 1rem; transition: 0.2s; }
        .sidebar button.active { background: var(--gold); color: var(--primary); font-weight: bold; }
        .logout-btn { margin-top: auto; color: #fda4af !important; border: 1px solid #451a1a !important; text-align: center !important; }
        
        .main { margin-left: 260px; flex: 1; padding: 40px; min-height: 100vh; box-sizing: border-box; width: calc(100% - 260px); }
        .header-bar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .stat-card { background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; min-width: 120px; }
        .stat-card div { font-size: 1.5rem; font-weight: bold; color: var(--primary); }

        .search-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        .search-box input { flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; }
        
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        
        .status { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .active-status { background: #dcfce7; color: #166534; }
        .inactive-status { background: #fee2e2; color: #991b1b; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-danger { background: #ef4444; color: white; margin-left: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>StorePulse 🚀</h2>
    <button onclick="showSection('agencias')" id="menu-agencias" class="active">🏢 Agencias</button>
    <button onclick="showSection('usuarios')" id="menu-usuarios">👥 Usuarios Globales</button>
    <button onclick="logout()" class="logout-btn">🚪 Cerrar Sesión</button>
</div>

<div class="main">
    <div class="header-bar">
        <h1 id="section-title">Gestión de Agencias</h1>
        <div style="display:flex; gap:10px;">
            <div class="stat-card"><small>AGENCIAS</small><div id="count-agencias">0</div></div>
            <div class="stat-card"><small>USUARIOS</small><div id="count-usuarios">0</div></div>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="globalSearch" placeholder="Buscar por nombre o email..." onkeyup="filterData()">
    </div>

    <div id="sec-agencias">
        <div class="card">
            <h3>➕ Nueva Agencia</h3>
            <div style="display: flex; gap: 10px;">
                <input id="new-ag-name" placeholder="Nombre de la Agencia" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                <input id="new-ag-email" placeholder="Email de contacto" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                <button class="btn" style="background:var(--gold); color:white;" onclick="crearAgencia()">REGISTRAR</button>
            </div>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Agencia</th><th>Email</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody id="lista-agencias"></tbody>
            </table>
        </div>
    </div>

    <div id="sec-usuarios" style="display: none;">
        <div class="card">
            <table>
                <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Agencia</th><th>Acciones</th></tr></thead>
                <tbody id="lista-usuarios-global"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const BACKEND_URL = "https://storepulse.onrender.com";
const userId = localStorage.getItem("userId");
const userRole = localStorage.getItem("role");

// Verificación de seguridad corregida
if(!userId || userRole !== "super-admin") {
    alert("Acceso denegado");
    window.location.href = "../login.html";
}

let rawAgencias = [], rawUsuarios = [], currentView = 'agencias';

// Función API centralizada con manejo de errores real
async function api(url, method = 'GET', body = null) {
    try {
        const res = await fetch(url, {
            method,
            headers: { 
                "Content-Type": "application/json", 
                "userId": userId 
            },
            body: body ? JSON.stringify(body) : null
        });
        if(!res.ok) {
            const errData = await res.json();
            throw new Error(errData.message || "Error en la petición");
        }
        return res.json();
    } catch (err) {
        console.error(err);
        alert(err.message);
        return null;
    }
}

function showSection(section) {
    currentView = section;
    document.getElementById('section-title').innerText = section === 'agencias' ? 'Gestión de Agencias' : 'Usuarios Globales';
    document.getElementById('sec-agencias').style.display = section === 'agencias' ? 'block' : 'none';
    document.getElementById('sec-usuarios').style.display = section === 'usuarios' ? 'block' : 'none';
    document.getElementById('menu-agencias').className = section === 'agencias' ? 'active' : '';
    document.getElementById('menu-usuarios').className = section === 'usuarios' ? 'active' : '';
    
    if(section === 'usuarios') loadGlobalUsers(); else loadAgencies();
}

async function loadAgencies() {
    const data = await api(`${BACKEND_URL}/agencies`);
    if(data) {
        rawAgencias = data;
        renderAgencias(rawAgencias);
        document.getElementById("count-agencias").innerText = rawAgencias.length;
    }
}

function renderAgencias(data) {
    document.getElementById("lista-agencias").innerHTML = data.map(a => `
        <tr>
            <td><strong>${a.name}</strong></td>
            <td>${a.email || 'N/A'}</td>
            <td><span class="status ${a.status === 'activa' ? 'active-status' : 'inactive-status'}">${a.status || 'INACTIVA'}</span></td>
            <td>
                <button class="btn" style="background:#f1f5f9" onclick="toggleAgencia('${a._id}', '${a.status}')">OnOff</button>
                <button class="btn btn-danger" onclick="eliminarAgencia('${a._id}', '${a.name}')">Borrar</button>
            </td>
        </tr>
    `).join("");
}

async function loadGlobalUsers() {
    const data = await api(`${BACKEND_URL}/users`);
    if(data) {
        rawUsuarios = data;
        renderUsuarios(rawUsuarios);
        // Actualizar contador
        const c = await api(`${BACKEND_URL}/users/count`);
        if(c) document.getElementById("count-usuarios").innerText = c.count || 0;
    }
}

function renderUsuarios(data) {
    document.getElementById("lista-usuarios-global").innerHTML = data.map(u => `
        <tr>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td><small>${u.role.toUpperCase()}</small></td>
            <td>${u.agencyId?.name || '<span style="color:#ccc">Sin Agencia</span>'}</td>
            <td><button class="btn btn-danger" onclick="eliminarUsuario('${u._id}')">Eliminar</button></td>
        </tr>
    `).join("");
}

function filterData() {
    const term = document.getElementById('globalSearch').value.toLowerCase();
    if(currentView === 'agencias') {
        renderAgencias(rawAgencias.filter(a => a.name.toLowerCase().includes(term) || (a.email && a.email.toLowerCase().includes(term))));
    } else {
        renderUsuarios(rawUsuarios.filter(u => u.name.toLowerCase().includes(term) || u.email.toLowerCase().includes(term) || (u.agencyId?.name || "").toLowerCase().includes(term)));
    }
}

async function crearAgencia() {
    const name = document.getElementById("new-ag-name").value;
    const email = document.getElementById("new-ag-email").value;
    if(!name || !email) return alert("Por favor llena todos los campos");
    
    // El servidor espera 'status', no 'active'
    const success = await api(`${BACKEND_URL}/agencies`, 'POST', { name, email, status: 'activa' });
    if(success) {
        document.getElementById("new-ag-name").value = "";
        document.getElementById("new-ag-email").value = "";
        loadAgencies();
    }
}

async function toggleAgencia(id, currentStatus) {
    const newStatus = currentStatus === 'activa' ? 'inactiva' : 'activa';
    await api(`${BACKEND_URL}/agencies/${id}`, 'PATCH', { status: newStatus });
    loadAgencies();
}

async function eliminarAgencia(id, nombre) {
    const confirmacion = prompt(`⚠️ ¡ATENCIÓN! Esto borrará permanentemente la agencia "${nombre}". Para confirmar, escribe el nombre de la agencia:`);
    if(confirmacion && confirmacion.toLowerCase() === nombre.toLowerCase()) {
        await api(`${BACKEND_URL}/agencies/${id}`, 'DELETE');
        loadAgencies();
    }
}

async function eliminarUsuario(id) {
    if(confirm("¿Estás seguro de eliminar este usuario?")) { 
        await api(`${BACKEND_URL}/users/${id}`, 'DELETE'); 
        loadGlobalUsers(); 
    }
}

function logout() { 
    localStorage.clear(); 
    window.location.href = "../login.html"; 
}

// Cargar datos iniciales
window.onload = () => {
    loadAgencies();
    // También cargamos el conteo de usuarios inicial
    api(`${BACKEND_URL}/users/count`).then(c => {
        if(c) document.getElementById("count-usuarios").innerText = c.count || 0;
    });
};
</script>

</body>
</html>
