<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte - StorePulse</title>
    <style>
        :root { --primary: #0B1F3A; --gold: #D4AF37; --bg: #F5F7FA; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 30px; }
        header { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 10; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; margin-right: 15px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--gold); padding-bottom: 8px; text-transform: capitalize; font-size: 1.3rem; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 800; margin-bottom: 8px; color: #4a5568; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #f8fafc; transition: border 0.3s; }
        input:focus { outline: none; border-color: var(--gold); background: white; }
        
        /* FOTO MEJORADA */
        .photo-preview { 
            width: 100%; 
            height: 200px; 
            background: #f1f5f9; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-top: 10px; 
            overflow: hidden; 
            border: 2px dashed #cbd5e1; 
            position: relative; 
            cursor: pointer;
        }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 25px; box-shadow: 0 4px 10px rgba(11, 31, 58, 0.2); transition: 0.3s; }
        .btn-main:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <button class="back-btn" onclick="history.back()">✕</button>
    <span id="headerTitle">Nuevo Reporte</span>
</header>

<div class="container">
    <div class="card">
        <h3 id="formTitle">Cargando...</h3>
        <form id="reportForm">
            <div class="form-group" id="group-articulo">
                <label>Nombre del Artículo / Marca</label>
                <input type="text" id="articulo" placeholder="Ej. Producto X 500ml">
            </div>

            <div id="block-demo" class="hidden">
                <div class="form-group"><label>Inv. Inicial</label><input type="number" id="inv_inicial" value="0"></div>
                <div class="form-group"><label>Ventas Realizadas</label><input type="number" id="ventas" value="0"></div>
                <div class="form-group"><label>Inv. Final</label><input type="number" id="inv_final" value="0"></div>
                <div class="form-group"><label>Precio de Venta ($)</label><input type="number" id="precio" value="0.00" step="0.01"></div>
            </div>

            <div class="form-group hidden" id="group-cantidad">
                <label id="label-cantidad">Cantidad</label>
                <input type="number" id="cantidad" value="0">
            </div>
            
            <div class="form-group hidden" id="group-precio-simple">
                <label>Precio Unitario ($)</label>
                <input type="number" id="precio_simple" value="0.00" step="0.01">
            </div>

            <div class="form-group hidden" id="group-foto">
                <label>Foto de Evidencia</label>
                <input type="file" id="foto" accept="image/*" capture="environment" onchange="previewImage(this)" class="hidden">
                <div class="photo-preview" id="preview" onclick="document.getElementById('foto').click()">
                    <span style="color:#94a3b8; font-size: 14px; text-align: center;">📸<br>Toca para tomar foto</span>
                </div>
            </div>

            <div class="form-group hidden" id="group-comentarios">
                <label>Comentarios / Observaciones</label>
                <textarea id="comentarios" rows="3" placeholder="Detalles adicionales..."></textarea>
            </div>

            <button type="button" id="btnSend" class="btn-main" onclick="saveReport()">ENVIAR REPORTE</button>
        </form>
    </div>
</div>

<script>
    const BACKEND_URL = "https://storepulse.onrender.com";
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    const storeId = localStorage.getItem("activeStoreId");
    const userId = localStorage.getItem("userId");

    const config = {
        'reporte_diario': { title: 'Reporte Diario', fields: ['block-demo', 'group-comentarios'] },
        'degustacion': { title: 'Degustación', fields: ['group-articulo', 'group-cantidad', 'group-foto'], labelQty: 'Degustaciones dadas' },
        'ventas': { title: 'Ventas de Turno', fields: ['group-articulo', 'group-cantidad'], labelQty: 'Unidades vendidas' },
        'precios': { title: 'Check de Precios', fields: ['group-articulo', 'group-precio-simple'] },
        'competencia': { title: 'Precios Competencia', fields: ['group-articulo', 'group-precio-simple', 'group-foto'] },
        'agotados': { title: 'Reporte Agotados', fields: ['group-articulo', 'group-foto'] },
        'inventario': { title: 'Inventario Físico', fields: ['group-articulo', 'group-cantidad'], labelQty: 'Cantidad en estante' },
        'exhibicion': { title: 'Exhibición Adicional', fields: ['group-foto', 'group-comentarios'], hideArt: true },
        'fotos_anaquel': { title: 'Foto de Anaquel', fields: ['group-foto'], hideArt: true },
        'fotos_exhibicion': { title: 'Foto de Exhibición', fields: ['group-foto'], hideArt: true }
    };

    window.onload = () => {
        if(!type || !config[type]) return window.location.href = "./home.html";
        
        const s = config[type];
        document.getElementById("formTitle").innerText = s.title;
        document.getElementById("headerTitle").innerText = s.title;

        s.fields.forEach(id => document.getElementById(id).classList.remove("hidden"));
        if(s.labelQty) document.getElementById("label-cantidad").innerText = s.labelQty;
        if(s.hideArt) document.getElementById("group-articulo").classList.add("hidden");
    };

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview').innerHTML = `<img src="${e.target.result}">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function saveReport() {
        const btn = document.getElementById("btnSend");
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        const formData = new FormData();
        formData.append("storeId", storeId);
        formData.append("type", type);
        formData.append("articulo", document.getElementById("articulo").value || "N/A");
        formData.append("cantidad", document.getElementById("cantidad").value || 0);
        
        // Unificar precio
        const priceVal = document.getElementById("precio").value || document.getElementById("precio_simple").value || 0;
        formData.append("precio", priceVal);
        
        formData.append("inv_inicial", document.getElementById("inv_inicial").value || 0);
        formData.append("inv_final", document.getElementById("inv_final").value || 0);
        formData.append("comentarios", document.getElementById("comentarios").value || "");
        
        // Foto (Asegúrate que el backend busque el campo "photo")
        const fotoInput = document.getElementById("foto");
        if(fotoInput.files[0]) {
            formData.append("photo", fotoInput.files[0]);
        }

        try {
            const res = await fetch(`${BACKEND_URL}/reports`, {
                method: "POST",
                headers: { "userId": userId }, // Enviamos el ID por header
                body: formData // Importante: FormData no lleva "Content-Type" manual
            });

            if(res.ok) {
                alert("✅ Enviado correctamente");
                window.location.href = "./home.html";
            } else {
                const errData = await res.json();
                alert("❌ Error: " + (errData.message || "Fallo al enviar"));
            }
        } catch (err) {
            alert("❌ Error de conexión");
        } finally {
            btn.disabled = false;
            btn.innerText = "ENVIAR REPORTE";
        }
    }
</script>
</body>
</html>
