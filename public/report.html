<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reportes PDF - StorePulse</title>
<style>
:root {
  --primary: #0B1F3A;
  --secondary: #D4AF37;
  --bg: #F5F7FA;
  --text: #1A1A1A;
}
body {
  font-family: Arial;
  margin: 0;
  background: var(--bg);
}
header {
  background: var(--primary);
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
}
header h1 {
  flex: 1;
  margin: 0;
  text-align: center;
}
.back {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}
.container {
  padding: 20px;
}
label, input, button {
  display: block;
  width: 100%;
  margin-bottom: 10px;
  font-size: 14px;
}
input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
button {
  background: var(--secondary);
  border: none;
  color: white;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}
button.secondary {
  background: #003366;
  margin-top: 5px;
}
.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>
<body>

<header>
  <button class="back" onclick="goBack()">⬅</button>
  <h1>Reportes PDF</h1>
</header>

<div class="container">
  <label>Fecha inicio:</label>
  <input type="date" id="start">
  <label>Fecha fin:</label>
  <input type="date" id="end">
  <button onclick="generateReport()">Generar Reporte</button>
  <button class="secondary" onclick="logout()">Cerrar sesión</button>
  <div class="error" id="error"></div>
</div>

<script>
// 🔹 URL dinámica del backend
function getBackendUrl() {
  return (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
    ? "http://192.168.1.10:3000"
    : "https://https://storepulse.onrender.com";
}

// 🔹 Navegación
function goBack() { window.history.back(); }

// 🔹 Cerrar sesión
function logout() {
  localStorage.clear();
  window.location.href="./login.html";
}

// 🔹 Generar reporte
function generateReport() {
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const error = document.getElementById("error");
  error.innerText = "";

  if (!start || !end) {
    error.innerText = "⚠️ Selecciona ambas fechas";
    return;
  }

  const agencyId = localStorage.getItem("agencyId");
  if (!agencyId) {
    window.location.href = "./login.html";
    return;
  }

  try {
    const url = `${getBackendUrl()}/report/${agencyId}?start=${start}&end=${end}`;
    window.open(url, "_blank");
  } catch(err) {
    console.error(err);
    error.innerText = "⚠️ No se pudo generar el reporte";
  }
}
</script>

</body>
</html>
